<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Bid Management | Violet Theme | Paginated</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Inter', 'Roboto', system-ui, -apple-system, sans-serif;
      background: #1a0f2e;
      color: #e2d6f0;
      margin: 0;
      padding: 20px;
      font-size: 13px;
    }

    .app-container {
      max-width: 1600px;
      margin: 0 auto;
      background: #2a1a45;
      border-radius: 24px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(156, 102, 255, 0.2);
      overflow: hidden;
    }

    .header-section {
      padding: 20px 28px 12px 28px;
      background: #311f55;
      border-bottom: 1px solid #4a3270;
    }

    h2 {
      font-size: 1.65rem;
      font-weight: 600;
      color: #e9d9ff;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h2:before {
      content: "📋";
      font-size: 1.7rem;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #241d3d;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 12px;
    }

    .stat-card strong {
      color: #c7aeff;
      margin-right: 8px;
    }

    .toolbar {
      margin-top: 18px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      max-width: 360px;
    }

    .search-wrapper input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border-radius: 40px;
      border: 1px solid #5e3f8a;
      background: #1f1436;
      color: #f0eaff;
      font-size: 13px;
      transition: all 0.2s;
    }

    .search-wrapper input:focus {
      outline: none;
      border-color: #a07eff;
      box-shadow: 0 0 0 3px rgba(160, 126, 255, 0.2);
      background: #281c42;
    }

    .search-wrapper::before {
      content: "🔍";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #b395ff;
    }

    .btn-primary {
      background: #6c3fd9;
      border: none;
      padding: 8px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 13px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: #835eff;
      transform: translateY(-1px);
    }

    .table-container {
      overflow-x: auto;
      background: #22173b;
      padding: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
      min-width: 1350px;
      background: #22173b;
    }

    th, td {
      border: 1px dotted #5a4780;
      padding: 12px 10px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #341f5a;
      color: #e5d5ff;
      font-weight: 600;
      font-size: 12.5px;
      border-bottom: 2px dotted #7c5eb3;
    }

    tbody tr:hover {
      background: #2e1f4e;
    }

    td a {
      color: #c2a0ff;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed #7a5bb5;
      cursor: pointer;
    }

    td a:hover {
      color: #e2caff;
    }

    td input {
      width: 130px;
      padding: 7px 10px;
      background: #1f1436;
      border: 1px solid #5c4190;
      border-radius: 12px;
      font-size: 12px;
      color: #f2eaff;
    }

    td input:focus {
      outline: none;
      border-color: #a07eff;
    }

    .action-btn {
      background: #42346b;
      border: none;
      padding: 6px 18px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 11px;
      color: #e7dcff;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: #5f44a3;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 700;
    }

    .status-accepted {
      background: #1f543e;
      color: #bbf0d9;
      border-left: 3px solid #58d68d;
    }

    .status-rejected {
      background: #6a2e2a;
      color: #ffc9c5;
      border-left: 3px solid #e67e72;
    }

    .status-disqualify {
      background: #6e4a2b;
      color: #ffdfb3;
      border-left: 3px solid #f5b041;
    }

    .lowest-bidder {
      background-color: #382b5a !important;
      box-shadow: inset 0 0 0 1px #9a7cdb;
    }

    .lowest-badge {
      background: #e2b642;
      color: #1f113a;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 30px;
      font-size: 9px;
      margin-left: 8px;
    }

    .pagination-container {
      padding: 20px 28px;
      background: #1f173a;
      border-top: 1px solid #4a3270;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .pagination-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .page-btn {
      background: #2c1e4a;
      border: 1px solid #5d468a;
      padding: 6px 12px;
      border-radius: 8px;
      color: #e2d5ff;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .page-btn:hover:not(:disabled) {
      background: #42346b;
      transform: translateY(-1px);
    }

    .page-btn.active {
      background: #6c3fd9;
      border-color: #a07eff;
      color: white;
    }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .page-info {
      font-size: 13px;
      color: #bfabff;
    }

    .page-size-select {
      background: #2c1e4a;
      border: 1px solid #5d468a;
      padding: 6px 10px;
      border-radius: 8px;
      color: #e2d5ff;
      font-size: 12px;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #2c1c49;
      border-radius: 28px;
      width: 1100px;
      max-width: 94%;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
      animation: modalPop 0.25s ease-out;
    }

    @keyframes modalPop {
      0% {
        opacity: 0;
        transform: scale(0.94) translateY(10px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-header {
      background: #38255f;
      padding: 18px 24px;
      border-bottom: 1px solid #5d468a;
      border-radius: 28px 28px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      margin: 0;
      font-weight: 600;
      color: #ede2ff;
      font-size: 1.3rem;
    }

    .close-btn {
      background: transparent;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #bfabff;
    }

    .close-btn:hover {
      color: #ffb7a4;
    }

    .modal-body {
      padding: 20px 24px;
      overflow-y: auto;
      background: #261b40;
      max-height: calc(88vh - 140px);
    }

    .nit-summary {
      background: #352857;
      border-radius: 20px;
      padding: 14px 20px;
      margin-bottom: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      border: 1px dotted #7e64b0;
    }

    .summary-item {
      font-size: 12px;
      background: #241d3d;
      padding: 6px 14px;
      border-radius: 30px;
      color: #dbceff;
    }

    .summary-item strong {
      color: #c7aeff;
      margin-right: 8px;
    }

    .vendor-table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 16px;
      overflow: hidden;
      background: #1f173a;
    }

    .vendor-table th, .vendor-table td {
      border: 1px dotted #6a5495;
      padding: 12px 10px;
    }

    .vendor-table th {
      background: #34225c;
      color: #e2d2ff;
    }

    .vendor-table input {
      background: #281e45;
      border: 1px solid #6c51a3;
      color: #f2ecff;
      border-radius: 12px;
      padding: 8px;
      width: 100%;
      font-size: 13px;
    }

    .vendor-table input:focus {
      outline: none;
      border-color: #a07eff;
    }

    .spinner-small {
      width: 14px;
      height: 14px;
      border: 2px solid #b59eff;
      border-top: 2px solid #ffffff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      margin-right: 6px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .modal-footer {
      background: #2c1e4a;
      padding: 16px 24px;
      border-top: 1px solid #5b4582;
      display: flex;
      justify-content: flex-end;
      gap: 14px;
      border-radius: 0 0 28px 28px;
    }

    .btn-secondary {
      background: #3e2c64;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      color: #e2d5ff;
    }

    .btn-warning {
      background: #735a32;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      color: #ffecb3;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #553d93;
      padding: 12px 24px;
      border-radius: 60px;
      color: white;
      font-weight: 600;
      z-index: 2100;
      display: none;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      font-size: 13px;
      align-items: center;
      gap: 10px;
      border-left: 4px solid #bd9eff;
    }

    .toast.error {
      background: #b84c4c;
      border-left-color: #ffaa88;
    }

    .toast.warning {
      background: #cc9c33;
      border-left-color: #ffdd99;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(20, 10, 35, 0.85);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #9a7edb;
      border-top: 4px solid #ffffff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .validation-banner {
      background: #6e4a2b;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 16px;
      color: #ffdfb3;
      border-left: 4px solid #f5b041;
    }

    .validation-banner.success {
      background: #1f543e;
      border-left-color: #58d68d;
      color: #bbf0d9;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header-section">
    <h2>Tender Bid Manager</h2>
    <div class="stats-bar">
      <div class="stat-card"><strong>📊 Total Records:</strong> <span id="totalRecords">0</span></div>
      <div class="stat-card"><strong>✅ Accepted:</strong> <span id="totalAccepted">0</span></div>
      <div class="stat-card"><strong>❌ Rejected:</strong> <span id="totalRejected">0</span></div>
      <div class="stat-card"><strong>⚠️ Disqualified:</strong> <span id="totalDisqualified">0</span></div>
    </div>
    <div class="toolbar">
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search by UNIQUE NIT, NIT, Vendor..." oninput="debouncedFilter()">
      </div>
      <button class="btn-primary" id="refreshBtn" onclick="refreshData()">⟳ Refresh Data</button>
    </div>
  </div>
  <div class="table-container">
    <table id="dataTable">
      <thead>
        <tr>
          <th>Timestamp</th><th>UNIQUE NIT</th><th>NIT</th><th>SL</th><th>NIT DATE (IST)</th><th>VENDOR</th>
          <th>Work Name</th><th>Source of Fund</th><th>ESTIMATE VALUE</th>
          <th>TENDER STATUS</th><th>Bid Amount (₹)</th><th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="pagination-container">
    <div class="page-info">
      Showing <span id="startRange">0</span> - <span id="endRange">0</span> of <span id="totalFiltered">0</span> records
    </div>
    <div class="pagination-controls">
      <select id="pageSizeSelect" class="page-size-select" onchange="changePageSize()">
        <option value="10">10 per page</option>
        <option value="20" selected>20 per page</option>
        <option value="50">50 per page</option>
        <option value="100">100 per page</option>
      </select>
      <button class="page-btn" id="firstPageBtn" onclick="goToPage(1)">⏮ First</button>
      <button class="page-btn" id="prevPageBtn" onclick="prevPage()">◀ Prev</button>
      <span id="pageNumbers" style="display: flex; gap: 5px;"></span>
      <button class="page-btn" id="nextPageBtn" onclick="nextPage()">Next ▶</button>
      <button class="page-btn" id="lastPageBtn" onclick="goToPage(totalPages)">Last ⏭</button>
    </div>
  </div>
</div>
<div id="toastMsg" class="toast">✓ Saved</div>
<div id="loadingOverlay" class="loading-overlay"><div class="loading-spinner"></div></div>

<!-- MODAL for NIT details -->
<div id="nitModal" class="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📌 Vendor Bids Management</h3>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Close</button>
      <button class="btn-warning" id="modalRecalcBtn" onclick="recalculateTenderStatusGroup()">⟳ Recalc Status</button>
      <button class="btn-primary" id="modalUpdateAllBtn" onclick="validateAndSaveAll()">💾 Save All Changes</button>
    </div>
  </div>
</div>

<script>
  // ======================== CONFIGURATION ==========================
  const scriptURL = "https://script.google.com/macros/s/AKfycbyr_2i6n9_9TgNTeUNvTknF52PsOPblarY2C_XPSE9Ls85v07ZmUK2cQbh0rZBLbTDM/exec";
  
  let masterRows = [];
  let filteredRows = [];
  let currentModalNit = null;
  let pendingChanges = new Map();
  let previousValidBidCount = 0;
  
  // Pagination variables
  let currentPage = 1;
  let pageSize = 20;
  let totalPages = 1;
  let searchTimeout = null;
  
  const IDX = {
    UNIQUE_NIT: 1,
    NIT: 2,
    VENDOR: 7,
    WORK_NAME: 6,
    SOURCE_FUND: 13,
    ESTIMATE: 16,
    BID_AMOUNT: 29,
    TENDER_STATUS: 10,
    RAW_DATE: 4
  };

  function formatIndianDate(dateValue) {
    if (!dateValue) return "";
    try {
      let dateObj = null;
      if (dateValue instanceof Date) dateObj = dateValue;
      else if (typeof dateValue === 'string') dateObj = new Date(dateValue);
      else if (typeof dateValue === 'number') dateObj = new Date(dateValue);
      if (!dateObj || isNaN(dateObj.getTime())) return String(dateValue);
      const day = String(dateObj.getDate()).padStart(2, '0');
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const year = dateObj.getFullYear();
      return `${day}/${month}/${year}`;
    } catch(e) { return String(dateValue); }
  }

  function formatTimestamp(timestampVal) {
    if (!timestampVal) return "";
    try {
      let d = new Date(timestampVal);
      if (isNaN(d.getTime())) return String(timestampVal);
      return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    } catch(e) { return String(timestampVal); }
  }

  function setLoading(show) {
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  }
  
  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    toast.style.display = 'flex';
    setTimeout(() => toast.style.display = 'none', 3000);
  }

  function updateStats() {
    let accepted = 0, rejected = 0, disqualified = 0;
    masterRows.forEach(row => {
      const status = row.data[IDX.TENDER_STATUS];
      if (status === "ACCEPTED") accepted++;
      else if (status === "REJECTED") rejected++;
      else disqualified++;
    });
    document.getElementById('totalRecords').textContent = masterRows.length;
    document.getElementById('totalAccepted').textContent = accepted;
    document.getElementById('totalRejected').textContent = rejected;
    document.getElementById('totalDisqualified').textContent = disqualified;
  }

  function getValidBidCount(uniqueNit) {
    const group = masterRows.filter(r => String(r.data[IDX.UNIQUE_NIT]) === String(uniqueNit));
    return group.filter(g => {
      const bid = parseFloat(g.data[IDX.BID_AMOUNT]);
      return !isNaN(bid) && bid > 0;
    }).length;
  }

  function validateBidsForNit(uniqueNit) {
    const group = masterRows.filter(r => String(r.data[IDX.UNIQUE_NIT]) === String(uniqueNit));
    const validBids = group.filter(g => {
      const bid = parseFloat(g.data[IDX.BID_AMOUNT]);
      return !isNaN(bid) && bid > 0;
    });
    
    if (validBids.length < 3) {
      return { valid: false, message: `⚠️ Minimum 3 bids required. Currently only ${validBids.length} valid bid(s) found.` };
    }
    
    const bidValues = validBids.map(g => parseFloat(g.data[IDX.BID_AMOUNT])).sort((a,b) => a - b);
    
    // Check if L1 is unique (lowest bid must be unique)
    if (bidValues[0] === bidValues[1]) {
      return { 
        valid: false, 
        message: `❌ Lowest bid (₹${bidValues[0]}) must be unique. Multiple vendors have the same lowest bid.` 
      };
    }
    
    // L2 and L3 can be same but must be greater than L1
    // This is automatically satisfied by the sort check above
    
    return { valid: true, message: null };
  }

  function computeTenderStatusForGroup(uniqueNit) {
    const groupItems = masterRows.filter(item => String(item.data[IDX.UNIQUE_NIT]) === String(uniqueNit));
    if (groupItems.length === 0) return false;
    
    let validBids = [];
    groupItems.forEach(item => {
      const bidRaw = item.data[IDX.BID_AMOUNT];
      let bidValue = null;
      if (bidRaw !== undefined && bidRaw !== null && bidRaw.toString().trim() !== "") {
        const num = parseFloat(bidRaw);
        if (!isNaN(num) && num > 0) bidValue = num;
      }
      if (bidValue === null || bidValue <= 0) {
        item.data[IDX.TENDER_STATUS] = "DISQUALIFY";
      } else {
        validBids.push({ item, bidValue });
      }
    });
    
    if (validBids.length >= 3) {
      // Sort bids in ascending order
      validBids.sort((a, b) => a.bidValue - b.bidValue);
      
      // Get unique bid values in order
      const uniqueBids = [];
      for (let i = 0; i < validBids.length; i++) {
        if (i === 0 || validBids[i].bidValue !== validBids[i-1].bidValue) {
          uniqueBids.push(validBids[i].bidValue);
        }
      }
      
      const lowestBid = uniqueBids[0];
      const hasDuplicateLowest = validBids.filter(v => v.bidValue === lowestBid).length > 1;
      
      if (!hasDuplicateLowest) {
        // Single L1 - assign ACCEPTED to lowest unique bid
        validBids.forEach(v => {
          if (Math.abs(v.bidValue - lowestBid) < 0.01) {
            v.item.data[IDX.TENDER_STATUS] = "ACCEPTED";
          } else {
            v.item.data[IDX.TENDER_STATUS] = "REJECTED";
          }
        });
        return true;
      } else {
        // Duplicate lowest bids - mark all as DISQUALIFY
        validBids.forEach(v => {
          v.item.data[IDX.TENDER_STATUS] = "DISQUALIFY";
        });
        return false;
      }
    } else if (validBids.length > 0 && validBids.length < 3) {
      validBids.forEach(v => {
        v.item.data[IDX.TENDER_STATUS] = "DISQUALIFY";
      });
      return false;
    }
    return false;
  }

  function recomputeAllTenderStatuses() {
    const uniqueNits = new Set();
    masterRows.forEach(item => {
      const nitVal = item.data[IDX.UNIQUE_NIT];
      if (nitVal) uniqueNits.add(String(nitVal));
    });
    for (let nit of uniqueNits) computeTenderStatusForGroup(nit);
    updateStats();
  }

  function getStatusBadge(status) {
    if (status === "ACCEPTED") return '<span class="status-badge status-accepted">✅ ACCEPTED</span>';
    if (status === "REJECTED") return '<span class="status-badge status-rejected">❌ REJECTED</span>';
    return '<span class="status-badge status-disqualify">⚠️ DISQUALIFY</span>';
  }

  function updateTableRowStatusAndHighlight(originalIdx) {
    const rowElement = document.querySelector(`tr[data-row-idx='${originalIdx}']`);
    if (!rowElement) return;
    const item = masterRows.find(r => r.originalIndex == originalIdx);
    if (!item) return;
    const status = item.data[IDX.TENDER_STATUS] || "DISQUALIFY";
    const statusCell = rowElement.querySelector('.status-cell');
    if (statusCell) statusCell.innerHTML = getStatusBadge(status);
    
    rowElement.classList.remove('lowest-bidder');
    const uniqueNit = String(item.data[IDX.UNIQUE_NIT]);
    const group = masterRows.filter(i => String(i.data[IDX.UNIQUE_NIT]) === uniqueNit);
    const acceptedValid = group.filter(i => i.data[IDX.TENDER_STATUS] === "ACCEPTED" && parseFloat(i.data[IDX.BID_AMOUNT]) > 0);
    if (acceptedValid.length) {
      let minAcc = Infinity;
      acceptedValid.forEach(i => { let b = parseFloat(i.data[IDX.BID_AMOUNT]); if(b < minAcc) minAcc = b; });
      const bidAmt = parseFloat(item.data[IDX.BID_AMOUNT]);
      if (!isNaN(bidAmt) && bidAmt > 0 && Math.abs(bidAmt - minAcc) < 0.01 && item.data[IDX.TENDER_STATUS] === "ACCEPTED") {
        rowElement.classList.add('lowest-bidder');
        let badgeSpan = rowElement.querySelector('.l1-badge');
        if (!badgeSpan && statusCell && !statusCell.innerHTML.includes('L1')) {
          statusCell.innerHTML += '<span class="lowest-badge l1-badge">L1</span>';
        }
      } else {
        const badgeSpan = rowElement.querySelector('.l1-badge');
        if(badgeSpan) badgeSpan.remove();
      }
    } else {
      const badgeSpan = rowElement.querySelector('.l1-badge');
      if(badgeSpan) badgeSpan.remove();
    }
  }

  function renderTablePage() {
    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";
    
    const startIdx = (currentPage - 1) * pageSize;
    const endIdx = Math.min(startIdx + pageSize, filteredRows.length);
    const pageRows = filteredRows.slice(startIdx, endIdx);
    
    if (!pageRows.length) {
      tbody.innerHTML = '<tr><td colspan="12" style="text-align:center; padding: 48px;">✨ No matching records</td></tr>';
      return;
    }
    
    pageRows.forEach(item => {
      const row = item.data;
      const origIdx = item.originalIndex;
      const uniqueNit = row[IDX.UNIQUE_NIT] ? String(row[IDX.UNIQUE_NIT]) : "";
      const nit = row[IDX.NIT] || "";
      const sl = row[3] || "";
      const nitDateDisplay = formatIndianDate(row[IDX.RAW_DATE]);
      const vendor = row[IDX.VENDOR] || "";
      const workName = row[IDX.WORK_NAME] || "";
      const fund = row[IDX.SOURCE_FUND] || "";
      const estimate = row[IDX.ESTIMATE] || "";
      const bidAmount = row[IDX.BID_AMOUNT] !== undefined ? row[IDX.BID_AMOUNT] : "";
      const status = row[IDX.TENDER_STATUS] || "DISQUALIFY";
      
      const tr = document.createElement('tr');
      tr.setAttribute('data-unique-nit', uniqueNit);
      tr.setAttribute('data-row-idx', origIdx);
      
      const groupMin = (() => {
        const groupAll = masterRows.filter(r => String(r.data[IDX.UNIQUE_NIT]) === uniqueNit);
        const acc = groupAll.filter(r => r.data[IDX.TENDER_STATUS] === "ACCEPTED" && parseFloat(r.data[IDX.BID_AMOUNT]) > 0);
        if (!acc.length) return null;
        return Math.min(...acc.map(r => parseFloat(r.data[IDX.BID_AMOUNT])));
      })();
      const bidNum = parseFloat(bidAmount);
      const isLowestAccepted = (status === "ACCEPTED" && groupMin !== null && !isNaN(bidNum) && bidNum > 0 && Math.abs(bidNum - groupMin) < 0.01);
      if (isLowestAccepted) tr.classList.add('lowest-bidder');
      
      tr.appendChild(createCell(formatTimestamp(row[0])));
      const tdNit = document.createElement('td');
      const link = document.createElement('a');
      link.textContent = uniqueNit || "-";
      link.onclick = (e) => { e.preventDefault(); openNitModal(uniqueNit); };
      tdNit.appendChild(link);
      tr.appendChild(tdNit);
      tr.appendChild(createCell(nit));
      tr.appendChild(createCell(sl));
      tr.appendChild(createCell(nitDateDisplay));
      tr.appendChild(createCell(vendor));
      tr.appendChild(createCell(workName));
      tr.appendChild(createCell(fund));
      tr.appendChild(createCell(estimate));
      
      const tdStatus = document.createElement('td');
      tdStatus.className = 'status-cell';
      tdStatus.innerHTML = getStatusBadge(status);
      if (isLowestAccepted) tdStatus.innerHTML += '<span class="lowest-badge l1-badge">L1</span>';
      tr.appendChild(tdStatus);
      
      const tdBid = document.createElement('td');
      const bidInput = document.createElement('input');
      bidInput.type = 'number';
      bidInput.step = '0.01';
      bidInput.value = bidAmount;
      bidInput.setAttribute('data-row-idx', origIdx);
      bidInput.addEventListener('input', function(e) {
        const newVal = e.target.value;
        const rowIdx = parseInt(this.getAttribute('data-row-idx'));
        const targetItem = masterRows.find(r => r.originalIndex === rowIdx);
        if (targetItem) {
          targetItem.data[IDX.BID_AMOUNT] = newVal;
          const nitVal = String(targetItem.data[IDX.UNIQUE_NIT]);
          computeTenderStatusForGroup(nitVal);
          applyFilter();
          if (currentModalNit === nitVal) refreshModalContent(nitVal);
        }
      });
      tdBid.appendChild(bidInput);
      tr.appendChild(tdBid);
      
      const tdAction = document.createElement('td');
      const saveBtn = document.createElement('button');
      saveBtn.textContent = 'UPDATE';
      saveBtn.className = 'action-btn';
      saveBtn.onclick = async () => await updateSingleBid(origIdx);
      tdAction.appendChild(saveBtn);
      tr.appendChild(tdAction);
      tbody.appendChild(tr);
    });
    
    updatePaginationInfo();
  }
  
  function createCell(txt) { const td = document.createElement('td'); td.textContent = txt || ''; return td; }
  
  async function updateSingleBid(origIdx, showToastMsg = true, closeModalAfter = false) {
    const btn = document.querySelector(`button[onclick*="updateSingleBid(${origIdx})"]`);
    if (btn) { btn.disabled = true; btn.textContent = "⏳"; }
    try {
      const item = masterRows.find(r => r.originalIndex === origIdx);
      if (!item) throw new Error("Row missing");
      const uniqueNit = item.data[IDX.UNIQUE_NIT];
      const vendor = item.data[IDX.VENDOR];
      const bidAmount = item.data[IDX.BID_AMOUNT];
      const tenderStatus = item.data[IDX.TENDER_STATUS];
      
      const validation = validateBidsForNit(String(uniqueNit));
      if (!validation.valid) {
        showToast(validation.message, 'warning');
        if (btn) { btn.textContent = "RETRY"; btn.disabled = false; }
        return false;
      }
      
      const formData = new FormData();
      formData.append("action", "updateBillPayment");
      formData.append("uniqueNit", String(uniqueNit));
      formData.append("vendor", String(vendor));
      formData.append("col11", bidAmount);
      formData.append("col23", tenderStatus);
      const res = await fetch(scriptURL, { method: "POST", body: formData });
      const result = await res.json();
      if (result.success) {
        if(showToastMsg) showToast(`✓ ${vendor} updated`, 'success');
        if (btn) { btn.textContent = "✓"; setTimeout(() => { if(btn) {btn.textContent="UPDATE"; btn.disabled=false;}}, 1000);}
        if (currentModalNit === String(uniqueNit)) {
          if (closeModalAfter) {
            closeModal();
            applyFilter();
          } else {
            refreshModalContent(currentModalNit);
          }
        }
        return true;
      } else throw new Error(result.error || "Update failed");
    } catch(err) {
      showToast(err.message, 'error');
      if(btn) { btn.textContent = "RETRY"; btn.disabled = false; }
      return false;
    }
  }
  
  // Pagination Functions
  function updatePaginationInfo() {
    totalPages = Math.ceil(filteredRows.length / pageSize);
    if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
    
    const start = (currentPage - 1) * pageSize + 1;
    const end = Math.min(currentPage * pageSize, filteredRows.length);
    
    document.getElementById('startRange').textContent = filteredRows.length ? start : 0;
    document.getElementById('endRange').textContent = end;
    document.getElementById('totalFiltered').textContent = filteredRows.length;
    
    document.getElementById('firstPageBtn').disabled = currentPage === 1;
    document.getElementById('prevPageBtn').disabled = currentPage === 1;
    document.getElementById('nextPageBtn').disabled = currentPage === totalPages || totalPages === 0;
    document.getElementById('lastPageBtn').disabled = currentPage === totalPages || totalPages === 0;
    
    renderPageNumbers();
  }
  
  function renderPageNumbers() {
    const container = document.getElementById('pageNumbers');
    container.innerHTML = '';
    
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, currentPage + 2);
    
    if (endPage - startPage < 4) {
      if (startPage === 1) endPage = Math.min(totalPages, startPage + 4);
      if (endPage === totalPages) startPage = Math.max(1, endPage - 4);
    }
    
    for (let i = startPage; i <= endPage; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
      btn.onclick = () => goToPage(i);
      container.appendChild(btn);
    }
  }
  
  function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTablePage();
  }
  
  function nextPage() {
    if (currentPage < totalPages) goToPage(currentPage + 1);
  }
  
  function prevPage() {
    if (currentPage > 1) goToPage(currentPage - 1);
  }
  
  function changePageSize() {
    pageSize = parseInt(document.getElementById('pageSizeSelect').value);
    currentPage = 1;
    renderTablePage();
  }
  
  function applyFilter() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    filteredRows = masterRows.filter(item => {
      const row = item.data;
      return (row[IDX.UNIQUE_NIT] && String(row[IDX.UNIQUE_NIT]).toLowerCase().includes(term)) ||
             (row[IDX.NIT] && String(row[IDX.NIT]).toLowerCase().includes(term)) ||
             (row[IDX.VENDOR] && String(row[IDX.VENDOR]).toLowerCase().includes(term));
    });
    currentPage = 1;
    renderTablePage();
  }
  
  function debouncedFilter() {
    if (searchTimeout) clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => applyFilter(), 300);
  }
  
  function openNitModal(uniqueNit) {
    currentModalNit = uniqueNit;
    previousValidBidCount = getValidBidCount(uniqueNit);
    const modal = document.getElementById('nitModal');
    modal.style.display = 'flex';
    renderModalContent(uniqueNit);
  }
  
  function renderModalContent(uniqueNit) {
    const group = masterRows.filter(r => String(r.data[IDX.UNIQUE_NIT]) === String(uniqueNit));
    if (!group.length) return;
    
    const firstRow = group[0].data;
    const workName = firstRow[IDX.WORK_NAME] || "";
    const fund = firstRow[IDX.SOURCE_FUND] || "";
    const estimate = firstRow[IDX.ESTIMATE] || "";
    const nitNo = firstRow[IDX.NIT] || "";
    const nitDateDisplay = formatIndianDate(firstRow[IDX.RAW_DATE]);
    
    const validBids = group.filter(g => {
      const bid = parseFloat(g.data[IDX.BID_AMOUNT]);
      return !isNaN(bid) && bid > 0;
    });
    const currentValidCount = validBids.length;
    const validation = validateBidsForNit(uniqueNit);
    
    let html = `<div class="nit-summary">
      <div class="summary-item"><strong>UNIQUE NIT:</strong> ${uniqueNit}</div>
      <div class="summary-item"><strong>NIT No.:</strong> ${nitNo}</div>
      <div class="summary-item"><strong>NIT Date:</strong> ${nitDateDisplay}</div>
      <div class="summary-item"><strong>Estimate:</strong> ₹${estimate}</div>
      <div class="summary-item"><strong>Valid Bids:</strong> ${currentValidCount}/3+ required</div>
      <div class="summary-item"><strong>Work:</strong> ${workName}</div>
      <div class="summary-item"><strong>Fund:</strong> ${fund}</div>
    </div>`;
    
    if (!validation.valid) {
      html += `<div class="validation-banner">⚠️ ${validation.message}</div>`;
    } else if (currentValidCount >= 3) {
      html += `<div class="validation-banner success">✅ ${currentValidCount} valid bids with unique L1 - Ready for evaluation!</div>`;
    }
    
    html += `<div style="overflow-x:auto"><table class="vendor-table"><thead>?
      <th>VENDOR</th><th>BID AMOUNT (₹)</th><th>TENDER STATUS</th><th>ACTION</th>
     </thead><tbody>`;
    
    group.forEach(g => {
      const vendor = g.data[IDX.VENDOR] || "";
      const bid = g.data[IDX.BID_AMOUNT] !== undefined ? g.data[IDX.BID_AMOUNT] : "";
      const status = g.data[IDX.TENDER_STATUS] || "DISQUALIFY";
      const isAccepted = status === "ACCEPTED";
      const rowStyle = isAccepted ? 'style="background: #1f543e30;"' : '';
      
      html += `<tr id="modalRow_${g.originalIndex}" ${rowStyle}>
        <td>${vendor}${isAccepted ? ' <span class="lowest-badge">L1</span>' : ''}</td>
        <td>
          <input type="number" step="0.01" id="modalBid_${g.originalIndex}" 
                 data-row-idx="${g.originalIndex}" value="${bid}" 
                 style="background: #281e45; border: 1px solid #6c51a3; border-radius: 12px; padding: 8px; width: 100%;">
         </td>
        <td id="modalStatus_${g.originalIndex}">${getStatusBadge(status)}</td>
        <td><button class="action-btn modal-save-btn" data-idx="${g.originalIndex}">💾 Save</button></td>
       </tr>`;
    });
    
    html += `</tbody></table></div>`;
    document.getElementById('modalBody').innerHTML = html;
    
    group.forEach(g => {
      const inp = document.getElementById(`modalBid_${g.originalIndex}`);
      if (inp) {
        inp.addEventListener('change', (e) => {
          const newVal = e.target.value;
          const rowIdx = parseInt(inp.getAttribute('data-row-idx'));
          const target = masterRows.find(r => r.originalIndex === rowIdx);
          if (target) {
            target.data[IDX.BID_AMOUNT] = newVal;
            pendingChanges.set(rowIdx, newVal);
            
            const currentValidCountNew = getValidBidCount(uniqueNit);
            
            if (previousValidBidCount < 3 && currentValidCountNew >= 3) {
              computeTenderStatusForGroup(uniqueNit);
              previousValidBidCount = currentValidCountNew;
              renderModalContent(uniqueNit);
              showToast(`✓ ${currentValidCountNew} valid bids detected - Statuses updated!`, 'success');
            } else {
              computeTenderStatusForGroup(uniqueNit);
              const statusSpan = document.getElementById(`modalStatus_${rowIdx}`);
              if (statusSpan) {
                statusSpan.innerHTML = getStatusBadge(target.data[IDX.TENDER_STATUS]);
              }
              previousValidBidCount = currentValidCountNew;
            }
            
            applyFilter();
          }
        });
      }
      
      const btn = document.querySelector(`.modal-save-btn[data-idx='${g.originalIndex}']`);
      if (btn) {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const orig = g.originalIndex;
          btn.innerHTML = '<span class="spinner-small"></span> Saving';
          btn.disabled = true;
          const success = await updateSingleBid(orig, true, false);
          if (success) {
            btn.innerHTML = '✓ Saved';
            pendingChanges.delete(orig);
            setTimeout(() => { 
              btn.innerHTML = '💾 Save'; 
              btn.disabled = false; 
            }, 1500);
            const statusSpan = document.getElementById(`modalStatus_${orig}`);
            if (statusSpan) {
              statusSpan.innerHTML = getStatusBadge(g.data[IDX.TENDER_STATUS]);
            }
            // Update the row styling for L1
            const modalRow = document.getElementById(`modalRow_${orig}`);
            if (modalRow) {
              const isAcceptedNew = g.data[IDX.TENDER_STATUS] === "ACCEPTED";
              if (isAcceptedNew) {
                modalRow.style.background = "#1f543e30";
                const vendorCell = modalRow.cells[0];
                if (!vendorCell.innerHTML.includes('L1')) {
                  vendorCell.innerHTML = g.data[IDX.VENDOR] + ' <span class="lowest-badge">L1</span>';
                }
              } else {
                modalRow.style.background = "";
                const vendorCell = modalRow.cells[0];
                vendorCell.innerHTML = g.data[IDX.VENDOR];
              }
            }
          } else {
            btn.innerHTML = 'RETRY';
            btn.disabled = false;
          }
        };
      }
    });
  }
  
  function refreshModalContent(uniqueNit) {
    previousValidBidCount = getValidBidCount(uniqueNit);
    renderModalContent(uniqueNit);
  }
  
  async function validateAndSaveAll() {
    if (!currentModalNit) return;
    
    const validation = validateBidsForNit(currentModalNit);
    if (!validation.valid) {
      showToast(validation.message, 'warning');
      return;
    }
    
    const group = masterRows.filter(r => String(r.data[IDX.UNIQUE_NIT]) === currentModalNit);
    const btnAll = document.getElementById('modalUpdateAllBtn');
    const originalText = btnAll.innerHTML;
    btnAll.innerHTML = '<span class="spinner-small"></span> Saving all...';
    btnAll.disabled = true;
    
    let updated = 0;
    let errors = [];
    
    for(let g of group) {
      try {
        const fd = new FormData();
        fd.append("action", "updateBillPayment");
        fd.append("uniqueNit", String(g.data[IDX.UNIQUE_NIT]));
        fd.append("vendor", String(g.data[IDX.VENDOR]));
        fd.append("col11", g.data[IDX.BID_AMOUNT]);
        fd.append("col23", g.data[IDX.TENDER_STATUS]);
        const res = await fetch(scriptURL, { method: "POST", body: fd });
        const resj = await res.json();
        if(resj.success) updated++;
        else errors.push(g.data[IDX.VENDOR]);
      } catch(e) {
        errors.push(g.data[IDX.VENDOR]);
      }
    }
    
    btnAll.innerHTML = originalText;
    btnAll.disabled = false;
    
    if (errors.length === 0) {
      showToast(`✅ All ${updated} vendor(s) saved successfully!`, 'success');
      pendingChanges.clear();
      closeModal(); // Close modal after successful save
      recomputeAllTenderStatuses();
      applyFilter();
    } else {
      showToast(`⚠️ Saved ${updated}/${group.length}. Failed: ${errors.join(', ')}`, 'warning');
    }
  }
  
  function recalculateTenderStatusGroup() {
    if(currentModalNit) {
      const validation = validateBidsForNit(currentModalNit);
      if (!validation.valid) {
        showToast(validation.message, 'warning');
        return;
      }
      computeTenderStatusForGroup(currentModalNit);
      refreshModalContent(currentModalNit);
      applyFilter();
      showToast("Status recalculated successfully", "success");
    }
  }
  
  function closeModal() { 
    document.getElementById('nitModal').style.display = 'none'; 
    currentModalNit = null;
    pendingChanges.clear();
    previousValidBidCount = 0;
  }
  
  async function loadData() {
    setLoading(true);
    try {
      const url = scriptURL + "?action=getBillPaymentData&t=" + Date.now();
      const resp = await fetch(url);
      const json = await resp.json();
      if (!json.success) throw new Error(json.error);
      if (!json.data || !json.data.length) throw new Error("Empty data");
      const rows = json.data.slice(1);
      masterRows = rows.map((row, idx) => ({ originalIndex: idx, data: row }));
      recomputeAllTenderStatuses();
      applyFilter();
      showToast(`Loaded ${masterRows.length} records`, "success");
    } catch(err) { 
      showToast("Error: "+err.message, "error"); 
      console.error(err); 
    } finally { 
      setLoading(false); 
    }
  }
  
  async function refreshData() { await loadData(); }
  
  window.filterTable = applyFilter;
  window.refreshData = refreshData;
  window.openNitModal = openNitModal;
  window.closeModal = closeModal;
  window.updateSingleBid = updateSingleBid;
  window.validateAndSaveAll = validateAndSaveAll;
  window.recalculateTenderStatusGroup = recalculateTenderStatusGroup;
  window.goToPage = goToPage;
  window.nextPage = nextPage;
  window.prevPage = prevPage;
  window.changePageSize = changePageSize;
  window.debouncedFilter = debouncedFilter;
  
  loadData();
</script>
</body>
</html>
