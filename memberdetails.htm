<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gram Panchayat Member Details - Bhagabanpur</title>
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  background: white;
  border-radius: 15px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  overflow: hidden;
  animation: slideIn 0.5s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.header {
  background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
  color: white;
  padding: 30px;
  text-align: center;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.header p {
  margin: 10px 0 0;
  opacity: 0.9;
}

/* Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 30px 30px 0 30px;
}

.stat-card {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  color: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: transform 0.3s;
}

.stat-card:hover {
  transform: translateY(-5px);
}

.stat-card h3 {
  margin: 0 0 10px 0;
  font-size: 14px;
  opacity: 0.9;
}

.stat-card .stat-number {
  font-size: 32px;
  font-weight: bold;
  margin: 5px 0;
}

.stat-card .stat-label {
  font-size: 12px;
  opacity: 0.8;
}

/* Search and Filter Bar */
.search-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
  padding: 20px 30px;
  background: #f0f2f5;
  border-top: 1px solid #e0e0e0;
  border-bottom: 1px solid #e0e0e0;
  margin-top: 30px;
}

.search-wrapper {
  flex: 1;
  min-width: 250px;
  position: relative;
}

.search-icon {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: #999;
}

.search-input {
  width: 100%;
  padding: 12px 15px 12px 45px;
  border: 2px solid #e0e0e0;
  border-radius: 25px;
  font-size: 14px;
  transition: all 0.3s;
  outline: none;
}

.search-input:focus {
  border-color: #4CAF50;
  box-shadow: 0 0 8px rgba(76,175,80,0.3);
}

.filter-group {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.filter-select {
  padding: 10px 20px;
  border: 2px solid #e0e0e0;
  border-radius: 25px;
  font-size: 14px;
  outline: none;
  cursor: pointer;
  background: white;
  transition: all 0.3s;
}

.filter-select:focus {
  border-color: #4CAF50;
}

.clear-btn {
  background: #ff5722;
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
}

.clear-btn:hover {
  background: #e64a19;
  transform: scale(1.05);
}

.export-btn {
  background: #4CAF50;
  color: white;
  border: none;
  padding: 10px 25px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
}

.export-btn:hover {
  background: #45a049;
  transform: scale(1.05);
}

.search-stats {
  padding: 10px 30px;
  text-align: right;
  font-size: 13px;
  color: #666;
  background: #fafafa;
}

/* Table Styles */
.table-wrapper {
  overflow-x: auto;
  padding: 0 30px 30px 30px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 800px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

th {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 14px 10px;
  text-align: center;
  border: 1px solid #ddd;
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 10;
}

td {
  padding: 12px 10px;
  text-align: center;
  border: 1px solid #ddd;
  word-wrap: break-word;
}

tr:nth-child(even) {
  background-color: #f8f9fa;
}

tr:hover {
  background-color: #e3f2fd;
  transition: 0.3s;
}

/* Role Badges */
.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
}

.badge-prodhan {
  background: #ffd700;
  color: #333;
}

.badge-vice {
  background: #4CAF50;
  color: white;
}

.badge-member {
  background: #2196F3;
  color: white;
}

.badge-leader {
  background: #ff5722;
  color: white;
}

.badge-other {
  background: #9C27B0;
  color: white;
}

.gender-male {
  color: #2196F3;
  font-weight: bold;
}

.gender-female {
  color: #E91E63;
  font-weight: bold;
}

@media (max-width: 768px) {
  body {
    padding: 10px;
  }
  
  .header h1 {
    font-size: 20px;
  }
  
  .stats-grid {
    padding: 20px;
    gap: 15px;
  }
  
  .search-bar {
    padding: 15px 20px;
    flex-direction: column;
  }
  
  .search-wrapper {
    width: 100%;
  }
  
  .table-wrapper {
    padding: 0 20px 20px 20px;
  }
  
  th, td {
    padding: 8px 6px;
    font-size: 11px;
  }
}

.loading {
  text-align: center;
  padding: 50px;
  font-size: 18px;
  color: #666;
}

.spinner {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #4CAF50;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 0 auto 10px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏛️ Bhagabanpur Gram Panchayat</h1>
    <p>Elected Members Directory | Terms & Details</p>
  </div>
  
  <!-- Statistics Cards -->
  <div class="stats-grid" id="stats-grid"></div>
  
  <!-- Search and Filter Bar -->
  <div class="search-bar">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="Search by Name, SANSAD, Guardian, Address, Contact..." onkeyup="filterTable()">
    </div>
    <div class="filter-group">
      <select class="filter-select" id="genderFilter" onchange="filterTable()">
        <option value="">All Genders</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <select class="filter-select" id="rankFilter" onchange="filterTable()">
        <option value="">All Ranks/Roles</option>
        <option value="PRODHAN">PRODHAN</option>
        <option value="VICE CHAIRMAN">VICE CHAIRMAN</option>
        <option value="MEMBER">MEMBER</option>
        <option value="Opposition Leader">Opposition Leader</option>
        <option value="Nari O Sishu Unnayan">Nari O Sishu Unnayan</option>
        <option value="Krishi O Pranisampad">Krishi O Pranisampad</option>
        <option value="Sikha O Jana Swastha">Sikha O Jana Swastha</option>
        <option value="Shilpa O Parikathamo">Shilpa O Parikathamo</option>
      </select>
      <button class="clear-btn" onclick="clearFilters()">✖ Clear All</button>
      <button class="export-btn" onclick="exportToCSV()">📥 Export CSV</button>
    </div>
  </div>
  <div class="search-stats" id="searchStats"></div>
  
  <!-- Member Table -->
  <div class="table-wrapper">
    <table id="memberTable">
      <thead>
        <tr>
          <th>Sl No</th>
          <th>SANSAD</th>
          <th>Member Name</th>
          <th>Guardian</th>
          <th>Gender</th>
          <th>PRI RANK</th>
          <th>Local Address</th>
          <th>Contact No</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- Data will be inserted here -->
      </tbody>
    </table>
  </div>
</div>

<script>
// Member Data
const membersData = [
  { sl: 1, sansad: "BHAGABANPUR/I-1", name: "FENSHI KHATUN", guardian: "JAINAL ABEDIN", gender: "Female", rank: "MEMBER", address: "GHAGARPAR", contact: "9733388693" },
  { sl: 2, sansad: "BHAGABANPUR/I-2", name: "REJAUL KARIM", guardian: "TAIMUDDIN AHMED", gender: "Male", rank: "Opposition Leader", address: "NIMGACHI", contact: "9735992075" },
  { sl: 3, sansad: "BHAGABANPUR/II-3", name: "NARGIS KHATUN", guardian: "HAYAT ALI", gender: "Female", rank: "MEMBER", address: "JASUYA", contact: "8670401859" },
  { sl: 4, sansad: "BHAGABANPUR/III-4", name: "KESHOMATI BARMAN", guardian: "NITAI DAS", gender: "Female", rank: "MEMBER", address: "BHAGABANPUR", contact: "8145001300" },
  { sl: 5, sansad: "BHAGABANPUR/IV-5", name: "ALO MAHALDAR", guardian: "RAJU MAHALDAR", gender: "Female", rank: "PRODHAN", address: "GOURIPUR", contact: "7074721220" },
  { sl: 6, sansad: "BHAGABANPUR/V-6", name: "TAJMIRA YEASMIN", guardian: "MOSTAFIJUR RAHAMAN", gender: "Female", rank: "Nari O Sishu Unnayan", address: "RAMDEBPUR", contact: "7074259477" },
  { sl: 7, sansad: "BHAGABANPUR/VI-7", name: "ANTARA KHATUN", guardian: "MAJEDUR", gender: "Female", rank: "MEMBER", address: "JYOTCHANDI", contact: "9958450623" },
  { sl: 8, sansad: "BHAGABANPUR/VII-8", name: "ABU BAKKAR SIDDIQUE", guardian: "BUDHU SARKAR", gender: "Male", rank: "MEMBER", address: "D KALIGANJ", contact: "8906909855" },
  { sl: 9, sansad: "BHAGABANPUR/VII-9", name: "NASIMA BANU", guardian: "MATIUR RAHAMAN", gender: "Female", rank: "MEMBER", address: "U KALIGANJ", contact: "9635836810" },
  { sl: 10, sansad: "BHAGABANPUR/VIII-10", name: "MD SHARIF ALI", guardian: "AMIRUDDIN", gender: "Male", rank: "MEMBER", address: "CHANDIPUR", contact: "9593700059" },
  { sl: 11, sansad: "BHAGABANPUR/IX-11", name: "HUSNARA KHATUN", guardian: "MOJAMMEL HOQUE", gender: "Female", rank: "Krishi O Pranisampad", address: "BHEBA EAST", contact: "9609561690" },
  { sl: 12, sansad: "BHAGABANPUR/X-12", name: "MD AL AMIN", guardian: "JOSHIMUDDIN", gender: "Male", rank: "MEMBER", address: "BHEBA WEST", contact: "7407460244" },
  { sl: 13, sansad: "BHAGABANPUR/XI-13", name: "FERDOSHI BEGAM", guardian: "ANBARUL", gender: "Female", rank: "MEMBER", address: "Serbabar Balarampur", contact: "9342082930" },
  { sl: 14, sansad: "BHAGABANPUR/XII-14", name: "INJILA", guardian: "HABIBUR RAHAMAN", gender: "Female", rank: "MEMBER", address: "Serbabar Balarampur", contact: "9735929646" },
  { sl: 15, sansad: "BHAGABANPUR/XIII-15", name: "GOLAP ALI", guardian: "HASIRUDDIN", gender: "Male", rank: "MEMBER", address: "CHARALU", contact: "7290835127" },
  { sl: 16, sansad: "BHAGABANPUR/XIV-16", name: "BENEJI KHATUN", guardian: "MD SAMIM ALAM", gender: "Female", rank: "MEMBER", address: "HARIPUR EAST", contact: "9593711972" },
  { sl: 17, sansad: "BHAGABANPUR/XV-17", name: "MD ATAUR RAHAMAN", guardian: "MD FAJLUR RAHAMAN", gender: "Male", rank: "MEMBER", address: "HARIPUR WEST", contact: "9733042218" },
  { sl: 18, sansad: "BHAGABANPUR/XVI-18", name: "KAUSARA BEGAM", guardian: "HARUN ALI", gender: "Female", rank: "Sikha O Jana Swastha", address: "PANBARA", contact: "9593309682" },
  { sl: 19, sansad: "BHAGABANPUR/XVII-19", name: "AFAJUDDIN AHAMED", guardian: "MAJIRUDDIN AHAMED", gender: "Male", rank: "MEMBER", address: "KHADIARPUR", contact: "8145850297" },
  { sl: 20, sansad: "BHAGABANPUR/XVIII-20", name: "ZED RAHAMAN", guardian: "RAJAUR RAHAMAN", gender: "Male", rank: "VICE CHAIRMAN", address: "ARBARA WEST", contact: "8327437767" },
  { sl: 21, sansad: "BHAGABANPUR/XIX-21", name: "MOUSUMI KHATUN", guardian: "MONWAR ALI", gender: "Female", rank: "MEMBER", address: "ARBARA EAST", contact: "7076775066" },
  { sl: 22, sansad: "BHAGABANPUR/XX-22", name: "SYED NEAMUL HOQUE", guardian: "SYED OSMANI ALI", gender: "Male", rank: "Shilpa O Parikathamo", address: "KHOSALPUR", contact: "9733951496" }
];

// Initialize page
document.addEventListener('DOMContentLoaded', () => {
  displayTable(membersData);
  updateStatistics(membersData);
});

function displayTable(data) {
  const tbody = document.getElementById('tableBody');
  
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">No matching records found</td></tr>';
    return;
  }
  
  let html = '';
  data.forEach(member => {
    const genderClass = member.gender === 'Male' ? 'gender-male' : 'gender-female';
    const rankBadge = getRankBadge(member.rank);
    
    html += `
      <tr>
        <td>${member.sl}</td>
        <td><strong>${member.sansad}</strong></td>
        <td>${member.name}</td>
        <td>${member.guardian}</td>
        <td class="${genderClass}">${member.gender === 'Male' ? '👨 ' : '👩 '}${member.gender}</td>
        <td>${rankBadge}</td>
        <td>${member.address}</td>
        <td>${member.contact}</td>
      </tr>
    `;
  });
  
  tbody.innerHTML = html;
}

function getRankBadge(rank) {
  const badges = {
    'PRODHAN': '<span class="badge badge-prodhan">⭐ PRODHAN</span>',
    'VICE CHAIRMAN': '<span class="badge badge-vice">⚡ VICE CHAIRMAN</span>',
    'MEMBER': '<span class="badge badge-member">📋 MEMBER</span>',
    'Opposition Leader': '<span class="badge badge-leader">🎯 Opposition Leader</span>',
    'Nari O Sishu Unnayan': '<span class="badge badge-other">🌸 Nari O Sishu</span>',
    'Krishi O Pranisampad': '<span class="badge badge-other">🌾 Krishi</span>',
    'Sikha O Jana Swastha': '<span class="badge badge-other">📚 Sikha</span>',
    'Shilpa O Parikathamo': '<span class="badge badge-other">🏭 Shilpa</span>'
  };
  return badges[rank] || `<span class="badge badge-other">${rank}</span>`;
}

function filterTable() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const genderFilter = document.getElementById('genderFilter').value;
  const rankFilter = document.getElementById('rankFilter').value;
  
  const filteredData = membersData.filter(member => {
    // Search filter
    const matchesSearch = searchTerm === '' || 
      member.name.toLowerCase().includes(searchTerm) ||
      member.sansad.toLowerCase().includes(searchTerm) ||
      member.guardian.toLowerCase().includes(searchTerm) ||
      member.address.toLowerCase().includes(searchTerm) ||
      member.contact.includes(searchTerm);
    
    // Gender filter
    const matchesGender = genderFilter === '' || member.gender === genderFilter;
    
    // Rank filter
    const matchesRank = rankFilter === '' || member.rank === rankFilter;
    
    return matchesSearch && matchesGender && matchesRank;
  });
  
  displayTable(filteredData);
  updateStatistics(filteredData);
  
  const statsDiv = document.getElementById('searchStats');
  statsDiv.innerHTML = `🔍 Found ${filteredData.length} matching records out of ${membersData.length} total`;
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('genderFilter').value = '';
  document.getElementById('rankFilter').value = '';
  filterTable();
}

function updateStatistics(data) {
  const totalMembers = data.length;
  const maleCount = data.filter(m => m.gender === 'Male').length;
  const femaleCount = data.filter(m => m.gender === 'Female').length;
  const uniqueSansad = new Set(data.map(m => m.sansad.split('/')[0])).size;
  
  const statsGrid = document.getElementById('stats-grid');
  statsGrid.innerHTML = `
    <div class="stat-card" style="background: linear-gradient(135deg, #667eea, #764ba2);">
      <h3>📋 Total Members</h3>
      <div class="stat-number">${totalMembers}</div>
      <div class="stat-label">Elected Representatives</div>
    </div>
    <div class="stat-card" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
      <h3>👨 Male Members</h3>
      <div class="stat-number">${maleCount}</div>
      <div class="stat-label">${Math.round((maleCount/totalMembers)*100)}% of Total</div>
    </div>
    <div class="stat-card" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
      <h3>👩 Female Members</h3>
      <div class="stat-number">${femaleCount}</div>
      <div class="stat-label">${Math.round((femaleCount/totalMembers)*100)}% of Total</div>
    </div>
    <div class="stat-card" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
      <h3>🏘️ Unique SANSADs</h3>
      <div class="stat-number">${uniqueSansad}</div>
      <div class="stat-label">Areas Covered</div>
    </div>
  `;
}

function exportToCSV() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const genderFilter = document.getElementById('genderFilter').value;
  const rankFilter = document.getElementById('rankFilter').value;
  
  let filteredData = membersData.filter(member => {
    const matchesSearch = searchTerm === '' || 
      member.name.toLowerCase().includes(searchTerm) ||
      member.sansad.toLowerCase().includes(searchTerm) ||
      member.guardian.toLowerCase().includes(searchTerm) ||
      member.address.toLowerCase().includes(searchTerm) ||
      member.contact.includes(searchTerm);
    const matchesGender = genderFilter === '' || member.gender === genderFilter;
    const matchesRank = rankFilter === '' || member.rank === rankFilter;
    return matchesSearch && matchesGender && matchesRank;
  });
  
  const headers = ['Sl No', 'SANSAD', 'Member Name', 'Guardian', 'Gender', 'PRI RANK', 'Local Address', 'Contact No'];
  let csvContent = headers.join(',') + '\n';
  
  filteredData.forEach(member => {
    const row = [
      member.sl,
      `"${member.sansad}"`,
      `"${member.name}"`,
      `"${member.guardian}"`,
      member.gender,
      `"${member.rank}"`,
      `"${member.address}"`,
      member.contact
    ];
    csvContent += row.join(',') + '\n';
  });
  
  const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.setAttribute('href', url);
  link.setAttribute('download', `Gram_Panchayat_Members_${new Date().toISOString().slice(0,19)}.csv`);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  
  alert(`Exported ${filteredData.length} records successfully!`);
}
</script>
</body>
</html>
