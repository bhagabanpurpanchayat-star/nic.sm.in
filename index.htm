<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhagabanpur Gram Panchayat | Role Portal | Malda</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary-dark: #0B2B40;
  --primary-accent: #1E5A6B;
  --secondary-deep: #1F3B4C;
  --highlight-gold: #E6B17E;
  --light-bg: #F4F7FB;
  --white: #FFFFFF;
  --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.1);
  --shadow-md: 0 8px 15px rgba(0, 0, 0, 0.15);
  --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.2);
  
  /* Role-based depth (same color family, different intensity) */
  --role-public-start: #1B4A5E;
  --role-public-end: #0F3A4A;
  --role-user-start: #0F3E52;
  --role-user-end: #0A2E3E;
  --role-office-start: #0A3345;
  --role-office-end: #062533;
  --role-admin-start: #052838;
  --role-admin-end: #031A26;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, sans-serif;
}

body {
  background: linear-gradient(145deg, #EFF2F7 0%, #E8EDF4 100%);
  color: #1E2F3E;
  overflow-x: hidden;
}

/* Header - Depth based on role */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: var(--shadow-md);
  transition: all 0.3s ease;
  border-bottom: 2px solid var(--highlight-gold);
}

.header-public { background: linear-gradient(135deg, var(--role-public-start) 0%, var(--role-public-end) 100%); }
.header-user { background: linear-gradient(135deg, var(--role-user-start) 0%, var(--role-user-end) 100%); }
.header-office { background: linear-gradient(135deg, var(--role-office-start) 0%, var(--role-office-end) 100%); }
.header-admin { background: linear-gradient(135deg, var(--role-admin-start) 0%, var(--role-admin-end) 100%); }

.header-container {
  max-width: 1600px;
  margin: auto;
  padding: 0.6rem 2rem;
}

.top-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  margin-bottom: 0.8rem;
  flex-wrap: wrap;
  gap: 1rem;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(255, 255, 255, 0.08);
  padding: 6px 20px;
  border-radius: 50px;
  flex-shrink: 0;
}

.logo i {
  font-size: 1.8rem;
  color: var(--highlight-gold);
  cursor: pointer;
  transition: transform 0.2s;
}

.logo i:hover {
  transform: scale(1.08);
  color: #FFD966;
}

.logo h1 {
  font-size: 1.1rem;
  font-weight: 700;
  background: linear-gradient(135deg, #FFFFFF, #FFE6C7);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

.logo span {
  font-size: 0.68rem;
  font-weight: 400;
  color: #CCE6F0;
  display: block;
}

.right-controls {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-shrink: 0;
}

.user-profile-badge {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(8px);
  padding: 5px 18px 5px 12px;
  border-radius: 60px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.user-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  border: 2px solid rgba(255,255,240,0.8);
  color: var(--highlight-gold);
  background: rgba(0, 0, 0, 0.5);
}

.user-info {
  display: flex;
  flex-direction: column;
  line-height: 1.3;
}

.user-email {
  font-size: 0.6rem;
  color: rgba(255,255,240,0.8);
  margin-top: 1px;
}

.user-role-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 12px;
  border-radius: 30px;
  display: inline-block;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 3px;
  background: rgba(0,0,0,0.4);
  color: var(--highlight-gold);
}

.digital-clock {
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(6px);
  padding: 7px 18px;
  border-radius: 40px;
  font-family: monospace;
  font-weight: 700;
  font-size: 1rem;
  color: #FFF5E6;
  border: 1px solid rgba(230, 177, 126, 0.6);
  white-space: nowrap;
}

.clock-date {
  font-size: 0.6rem;
  font-weight: 500;
  color: var(--highlight-gold);
  text-align: center;
}

.signin-btn, .signout-btn {
  background: linear-gradient(145deg, var(--highlight-gold), #D49B5F);
  border: none;
  color: var(--primary-dark);
  font-weight: 700;
  padding: 8px 28px;
  border-radius: 40px;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 5px 0 #9B6E42;
  transition: 0.2s;
}

.signout-btn {
  background: linear-gradient(145deg, #D96C6C, #B34A4A);
  color: white;
  box-shadow: 0 5px 0 #7A2E2E;
}

.signin-btn:hover, .signout-btn:hover { transform: translateY(-2px); }

.nav-wrapper { width: 100%; margin-top: 0.5rem; }
nav ul { list-style: none; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
nav li { position: relative; }
nav > ul > li > a {
  text-decoration: none; color: white; padding: 10px 24px; display: block;
  font-size: 0.85rem; font-weight: 600; text-align: center; cursor: pointer;
  background: rgba(0, 0, 0, 0.25); border-radius: 12px; transition: all 0.08s linear;
}
nav > ul > li > a:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
.submenu {
  list-style: none; position: absolute; top: 100%; left: 0; min-width: 240px;
  background: var(--primary-dark); border-radius: 16px; box-shadow: 0 12px 24px rgba(0,0,0,0.3);
  display: none; flex-direction: column; z-index: 999; padding: 8px 0;
  border: 1px solid rgba(230, 177, 126, 0.4); border-top: 3px solid var(--highlight-gold);
}
.submenu li a {
  padding: 8px 20px; display: block; text-decoration: none; color: #F5F0E6;
  font-size: 0.8rem; font-weight: 500; transition: all 0.2s; margin: 2px 8px;
  border-radius: 30px; background: rgba(30, 90, 107, 0.3); cursor: pointer;
}
.submenu li a:hover { background: var(--highlight-gold); color: var(--primary-dark); transform: translateX(6px); }
nav li:hover > .submenu { display: flex; animation: fadeDrop 0.2s ease; }
.has-submenu::after { content: " ▼"; font-size: 0.65rem; }

.iframe-container { width: 100%; height: calc(100vh - 115px); overflow: hidden; }
iframe { width: 100%; height: 100%; border: none; }

footer {
  background: linear-gradient(135deg, var(--primary-dark), #0C3346);
  color: #E6F0F5; text-align: center; padding: 0.7rem; font-size: 0.72rem;
  border-top: 2px solid var(--highlight-gold);
}

.toast-notification, .session-toast {
  position: fixed; bottom: 30px; right: 30px;
  background: rgba(11, 43, 64, 0.95); color: #FFEEDD; padding: 12px 24px;
  border-radius: 40px; font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  border-left: 5px solid var(--highlight-gold); z-index: 2100;
  backdrop-filter: blur(8px); transform: translateX(400px); transition: transform 0.3s ease;
}
.session-toast { bottom: auto; top: 20px; background: linear-gradient(135deg, #B34A4A, #8B3A3A); border-left-color: #FFD966; }
.show { transform: translateX(0); }

/* LOGIN MODAL */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  visibility: hidden; opacity: 0; transition: visibility 0.25s, opacity 0.25s;
}
.modal-overlay.active { visibility: visible; opacity: 1; }
.auth-modal-card {
  width: 500px; max-width: 90vw; background: linear-gradient(145deg, #1A2F3A, #0F2A35);
  border-radius: 1.5rem; box-shadow: 0 30px 50px rgba(0,0,0,0.5);
  overflow: hidden; border: 1px solid rgba(230, 177, 126, 0.4);
}
.modal-header {
  background: linear-gradient(135deg, #0B2B40, #1E5A6B);
  padding: 1rem 1.5rem; display: flex; justify-content: space-between;
  align-items: center; border-bottom: 2px solid var(--highlight-gold);
}
.modal-header button { background: rgba(255,255,255,0.15); border: none; color: white; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; }
.modal-form-content { padding: 1.5rem; }
.tabs-modal { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; background: rgba(0,0,0,0.3); border-radius: 3rem; padding: 0.25rem; }
.tab-modal-btn { flex: 1; background: transparent; border: none; padding: 0.7rem 0; font-weight: 600; border-radius: 2rem; color: #b9c7d9; cursor: pointer; }
.tab-modal-btn.active { background: var(--highlight-gold); color: #0B2B40; }
.form-panel-modal { display: none; }
.form-panel-modal.active-panel-modal { display: block; }
.input-group { margin-bottom: 1.2rem; }
.input-group label { display: block; font-size: 0.8rem; margin-bottom: 0.4rem; color: #cbd5e6; }
.input-wrapper { position: relative; display: flex; align-items: center; }
.input-wrapper i { position: absolute; left: 1rem; color: #8ba0bc; }
.input-wrapper input { width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; padding: 0.75rem 1rem 0.75rem 2.6rem; border-radius: 2rem; color: #f1f5f9; outline: none; }
.checkbox-row { margin: 0.8rem 0 1.4rem; }
.checkbox-label { display: flex; align-items: center; gap: 0.5rem; color: #cbd5e6; font-size: 0.8rem; cursor: pointer; }
.action-btn-modal { width: 100%; background: linear-gradient(98deg, #1E5A6B, #0B2B40); border: none; padding: 0.8rem; border-radius: 2rem; font-weight: 700; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem; transition: 0.2s; }
.message-area-modal { margin-top: 1rem; font-size: 0.75rem; text-align: center; padding: 0.5rem; border-radius: 2rem; }
.error-msg-modal { background: rgba(244, 63, 94, 0.2); color: #fecdd3; }
.success-msg-modal { background: rgba(34, 197, 94, 0.15); color: #bef264; }
.loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* CONTROL MANAGER MODAL - Full Featured */
.control-manager-modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  visibility: hidden; opacity: 0; transition: visibility 0.25s, opacity 0.25s;
}
.control-manager-modal.active { visibility: visible; opacity: 1; }
.control-modal-card {
  width: 950px; max-width: 92vw; max-height: 85vh;
  background: linear-gradient(145deg, #1A2F3A, #0F2A35);
  border-radius: 1.5rem; box-shadow: 0 30px 50px rgba(0,0,0,0.5);
  overflow: hidden; border: 1px solid rgba(230, 177, 126, 0.4);
  display: flex; flex-direction: column;
}
.control-modal-header {
  background: linear-gradient(135deg, #0B2B40, #1E5A6B);
  padding: 1rem 1.5rem; display: flex; justify-content: space-between;
  align-items: center; border-bottom: 2px solid var(--highlight-gold);
}
.control-modal-header button {
  background: rgba(255,255,255,0.15); border: none; color: white;
  width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
}
.control-modal-tabs {
  display: flex; gap: 0.5rem; padding: 1rem 1.5rem 0 1.5rem;
  background: rgba(0, 0, 0, 0.2); flex-wrap: wrap;
}
.tab-btn {
  background: rgba(30, 90, 107, 0.5); border: none; padding: 8px 20px;
  border-radius: 30px; color: #CCE6F0; font-weight: 600; font-size: 0.85rem;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
}
.tab-btn.active { background: var(--highlight-gold); color: var(--primary-dark); }
.tab-panel { display: none; padding: 1.5rem; overflow-y: auto; flex: 1; }
.tab-panel.active-panel { display: block; }
.form-group { margin-bottom: 1.2rem; }
.form-group label { display: block; color: #CCE6F0; font-size: 0.8rem; margin-bottom: 0.4rem; }
.form-group input, .form-group select {
  width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155;
  padding: 0.7rem 1rem; border-radius: 2rem; color: #f1f5f9; font-size: 0.9rem; outline: none;
}
.action-btn {
  background: linear-gradient(98deg, #1E5A6B, #0B2B40); border: none;
  padding: 0.8rem 1.5rem; border-radius: 2rem; font-weight: 700; color: white;
  cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s;
}
.users-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
.users-table th, .users-table td { padding: 12px 8px; border-bottom: 1px solid rgba(230, 177, 126, 0.2); color: #E6F0F5; font-size: 0.85rem; text-align: left; }
.permission-badge { display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 700; }
.permission-allowed { background: #2E7D64; color: white; }
.permission-denied { background: #B34A4A; color: white; }
.switch { position: relative; display: inline-block; width: 54px; height: 28px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #B34A4A; transition: 0.3s; border-radius: 34px; }
.slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background-color: white; transition: 0.3s; border-radius: 50%; }
input:checked + .slider { background-color: #2E7D64; }
input:checked + .slider:before { transform: translateX(26px); }
.role-select { background: rgba(15, 23, 42, 0.9); border: 1px solid var(--highlight-gold); padding: 6px 10px; border-radius: 24px; color: white; font-size: 0.8rem; cursor: pointer; }
.update-role-btn { background: var(--highlight-gold); border: none; padding: 6px 14px; border-radius: 30px; font-weight: bold; color: #0B2B40; cursor: pointer; font-size: 0.7rem; margin-left: 6px; }
.search-box { margin-bottom: 1rem; display: flex; gap: 10px; }
.search-box input { flex: 1; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; padding: 0.6rem 1rem; border-radius: 2rem; color: white; }
.empty-state { text-align: center; padding: 2rem; color: #8AA0BC; }

@media (max-width: 768px) { .iframe-container { height: calc(100vh - 180px); } }
</style>
</head>
<body>
<header id="mainHeader">
  <div class="header-container">
    <div class="top-header">
      <div class="logo"><i class="fas fa-home" onclick="loadPage('home1')"></i><div><h1>Bhagabanpur Gram Panchayat</h1><span>ভগবানপুর গ্রাম পঞ্চায়েত | মালদহ</span></div></div>
      <div class="right-controls" id="rightControls"></div>
    </div>
    <div class="nav-wrapper"><nav><ul id="dynamicMenuContainer"></ul></nav></div>
  </div>
</header>

<div class="iframe-container"><iframe id="frameContent" src="home1.htm"></iframe></div>
<footer><p>© 2025 Bhagabanpur Gram Panchayat, Malda | Citizen First | e-Governance Initiative</p></footer>
<div id="signoutToast" class="toast-notification"><i class="fas fa-check-circle"></i><span>Signed out. Redirecting...</span></div>

<!-- LOGIN MODAL -->
<div id="signinModal" class="modal-overlay">
  <div class="auth-modal-card">
    <div class="modal-header"><h3><i class="fas fa-id-card"></i> Official Login</h3><button id="closeModalBtn"><i class="fas fa-times"></i></button></div>
    <div class="modal-form-content">
      <div class="tabs-modal"><button class="tab-modal-btn active" id="modalSigninTab">Sign In</button><button class="tab-modal-btn" id="modalSignupTab">Sign Up</button></div>
      <div id="modalSigninPanel" class="form-panel-modal active-panel-modal">
        <form id="modalLoginForm">
          <div class="input-group"><label>Email / Username</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="text" id="modalLoginUser" placeholder="Enter email"></div></div>
          <div class="input-group"><label>Password</label><div class="input-wrapper"><i class="fas fa-key"></i><input type="password" id="modalLoginPass" placeholder="Password"></div></div>
          <div class="checkbox-row"><label class="checkbox-label"><input type="checkbox" id="modalRemember"> Remember me</label></div>
          <button type="submit" class="action-btn-modal">Sign In</button>
          <div id="modalLoginMsg" class="message-area-modal"></div>
        </form>
      </div>
      <div id="modalSignupPanel" class="form-panel-modal">
        <form id="modalSignupForm">
          <div class="input-group"><label>Full Name</label><div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="modalSignupName"></div></div>
          <div class="input-group"><label>Email</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="modalSignupEmail"></div></div>
          <div class="input-group"><label>Password</label><div class="input-wrapper"><i class="fas fa-key"></i><input type="password" id="modalSignupPass"></div></div>
          <div class="checkbox-row"><label class="checkbox-label"><input type="checkbox" id="modalTerms"> I agree to Terms</label></div>
          <button type="submit" class="action-btn-modal">Create Account</button>
          <div id="modalSignupMsg" class="message-area-modal"></div>
        </form>
        <div style="margin-top:1rem; text-align:center; font-size:0.65rem; color:#8aa0bc;">Account needs admin approval before login.</div>
      </div>
    </div>
  </div>
</div>

<!-- CONTROL MANAGER MODAL - Full Featured -->
<div id="controlManagerModal" class="control-manager-modal">
  <div class="control-modal-card">
    <div class="control-modal-header"><h3><i class="fas fa-users-cog"></i> Control Manager</h3><button id="closeControlModal"><i class="fas fa-times"></i></button></div>
    <div class="control-modal-tabs">
      <button class="tab-btn" data-tab="add"><i class="fas fa-user-plus"></i> Add User</button>
      <button class="tab-btn" data-tab="view"><i class="fas fa-eye"></i> View Users</button>
      <button class="tab-btn" data-tab="delete"><i class="fas fa-trash-alt"></i> Delete User</button>
      <button class="tab-btn" data-tab="permission"><i class="fas fa-shield-alt"></i> Permission</button>
    </div>
    <div id="addPanel" class="tab-panel">
      <form id="addUserForm">
        <div class="form-group"><label>Full Name</label><input type="text" id="addFullName" placeholder="Enter full name" required></div>
        <div class="form-group"><label>Email / Username</label><input type="email" id="addEmail" placeholder="user@example.com" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="addPassword" placeholder="Min. 4 characters" required></div>
        <div class="form-group"><label>Role</label><select id="addRole"><option value="User">User</option><option value="Admin">Admin</option><option value="Office">Office</option></select></div>
        <div class="form-group"><label>Initial Permission</label><select id="addPermission"><option value="Denied">Pending Approval</option><option value="Allowed">Allowed</option></select></div>
        <button type="submit" class="action-btn"><i class="fas fa-save"></i> Create User</button>
      </form>
      <div id="addUserMsg" style="margin-top:1rem; color:var(--highlight-gold);"></div>
    </div>
    <div id="viewPanel" class="tab-panel">
      <div class="search-box"><input type="text" id="searchUsers" placeholder="Search by username..."><button class="action-btn" onclick="loadUsersFromSheet()"><i class="fas fa-sync-alt"></i> Refresh</button></div>
      <div id="usersListContainer"><div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Loading users...</div></div>
    </div>
    <div id="deletePanel" class="tab-panel">
      <div class="search-box"><input type="text" id="deleteSearch" placeholder="Search user..."></div>
      <div id="deleteUsersList"></div>
      <div id="deleteMsg" style="margin-top:1rem;"></div>
    </div>
    <div id="permissionPanel" class="tab-panel">
      <div class="search-box"><input type="text" id="permSearch" placeholder="Search by username..."></div>
      <div id="permissionUsersList"></div>
      <div id="permMsg" style="margin-top:1rem;"></div>
    </div>
  </div>
</div>

  const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8TuO2JCiZVMkTBt5I7aFoab7HlRxFqXYTFtBotBJglVy-zKYVZ7QWsbmkYchHqpHptg/exec';
  let validationInterval = null;

  // Menu Labels
  const menuLabels = {

    'clubs':'Clubs','playgrounds':'Play Grounds','waterbodies':'Waterbodies','gp_member':'GP Member','ps_member':'PS Member',
    'staffs':'Staffs','vrp':'VRP','cf':'CF','nregs':'NREGS Supervisor','15fc':'15th FC','beup':'BEUP','vwsc':'VWSC','mgnregs':'MGNREGS',

    'najim':'Najim Ali','rehan':'Rehan Ali','vrpcf':'VRP & CF Certificate','teashop':'Tea Shop Bill',
    'tender':'Tender','meeting':'Meeting','googlemap':'Google Map','bbg':'Banglar Bari','secc':'SECC-2011','sirfinalroll2026':'SIR FINAL ROLL 2026'

  // Role-based menus
  const PUBLIC_MENU = [{name:"GP Info", items:["basicdetails","memberdetails","villages","mouja"]},{name:"Services", items:["deathbirth","variousletter","secc","sirfinalroll2026"]},{name:"Forms", items:["samabyathi","income","domicile"]}];
  const USER_MENU = [{name:"Profile", items:["basicdetails","memberdetails","villages","mouja","school","polling","clubs","playgrounds","waterbodies"]},{name:"Services", items:["deathbirth","variousletter","laxmirbhandar","secc","sirfinalroll2026"]},{name:"Forms", items:["samabyathi","income","domicile"]}];
  const OFFICE_MENU = [
    {name:"Profile", items:["basicdetails","memberdetails","villages","mouja","school","polling","clubs","playgrounds","waterbodies"]},
    {name:"PRI Details", items:["gp_member","ps_member","staffs","vrp","cf","nregs"]},{name:"Funds", items:["15fc","beup","vwsc","mgnregs","mplad","ibrd","5sfc"]},
    {name:"Services", items:["deathbirth","variousletter","laxmirbhandar","secc","sirfinalroll2026"]},{name:"Forms", items:["samabyathi","income","domicile"]},
    {name:"Bill Print", items:["najim","rehan","vrpcf","teashop"]},{name:"Office Zone", items:["tender","meeting","googlemap","bbg"]}
  ];
  const ADMIN_MENU = [...OFFICE_MENU, {name:"⚙️ Control Manager", action:"openControlManager"}];

  function normalizeRole(role) { if(!role) return 'Public'; const r=role.toString().toLowerCase(); if(r==='admin') return 'Admin'; if(r==='office') return 'Office'; if(r==='user') return 'User'; return 'Public'; }
  function getRoleDisplay(role) { const n=normalizeRole(role); if(n==='Admin') return 'ADMIN'; if(n==='Office') return 'OFFICE'; if(n==='User') return 'USER'; return 'PUBLIC'; }
  
  function updateHeaderDepth(role) {
    const header = document.getElementById('mainHeader');
    header.classList.remove('header-public', 'header-user', 'header-office', 'header-admin');
    const roleNorm = normalizeRole(role);
    if(roleNorm === 'Admin') header.classList.add('header-admin');
    else if(roleNorm === 'Office') header.classList.add('header-office');
    else if(roleNorm === 'User') header.classList.add('header-user');
    else header.classList.add('header-public');
  }

  function buildMenuHTML(items) { if(!items||!items.length) return '<li><a>Menu</a></li>'; let html=''; for(let item of items){ if(item.items){ html+=`<li><a class="has-submenu">${item.name}</a><ul class="submenu">`; item.items.forEach(p=>{ html+=`<li><a onclick="loadPage('${p}')">${menuLabels[p]||p}</a></li>`; }); html+=`</ul></li>`; } else if(item.action==='openControlManager'){ html+=`<li><a onclick="openControlManager('add')"><i class="fas fa-users-cog"></i> Control Manager</a></li>`; } } return html; }
  function renderMenu() { const session=getSession(); let menu; if(!session) menu=PUBLIC_MENU; else{ const role=normalizeRole(session.role); if(role==='Admin') menu=ADMIN_MENU; else if(role==='Office') menu=OFFICE_MENU; else menu=USER_MENU; } document.getElementById('dynamicMenuContainer').innerHTML=buildMenuHTML(menu); }
  
  function getSession(){ try{ const s=localStorage.getItem('gp_user_session')||sessionStorage.getItem('gp_user_session'); return s?JSON.parse(s):null; }catch(e){ return null; } }
  function setSession(data,remember){ if(remember) localStorage.setItem('gp_user_session',JSON.stringify(data)); else sessionStorage.setItem('gp_user_session',JSON.stringify(data)); }
  function clearSession(){ localStorage.removeItem('gp_user_session'); sessionStorage.removeItem('gp_user_session'); }

  function updateAuthUI() {
    const session = getSession();
    const container = document.getElementById('rightControls');
    if (!session) {
      updateHeaderDepth('Public');
      container.innerHTML = `<div class="digital-clock"><div id="liveTime">--:--:--</div><div id="liveDate" class="clock-date">---</div></div><button class="signin-btn" id="signInBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button>`;
      document.getElementById('signInBtn')?.addEventListener('click', () => document.getElementById('signinModal').classList.add('active'));
    } else {
      updateHeaderDepth(session.role);
      const roleDisplay = getRoleDisplay(session.role);
      const displayName = session.name || session.username.split('@')[0];
      const emailDisplay = session.username || 'user@domain.com';
      container.innerHTML = `
        <div class="user-profile-badge">
          <div class="user-avatar">${displayName.substring(0,2).toUpperCase()}</div>
          <div class="user-info">
            <div class="user-email">${emailDisplay}</div>
            <div class="user-role-badge">${roleDisplay}</div>
          </div>
        </div>
        <div class="digital-clock"><div id="liveTime">--:--:--</div><div id="liveDate" class="clock-date">---</div></div>
        <button class="signout-btn" id="signOutBtn"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
      `;
      document.getElementById('signOutBtn')?.addEventListener('click', handleSignOut);
    }
    updateClock();
    setInterval(updateClock, 1000);
  }
  
  function updateClock(){ const now=new Date(); let h=now.getHours(),m=now.getMinutes(),s=now.getSeconds(),ap=h>=12?'PM':'AM'; h=h%12||12; const t=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')} ${ap}`; const d=now.toLocaleDateString('en-IN',{weekday:'short',year:'numeric',month:'short',day:'numeric'}); const tel=document.getElementById('liveTime'), del=document.getElementById('liveDate'); if(tel) tel.innerText=t; if(del) del.innerText=d; }
  
  async function handleSignOut(){ clearSession(); if(validationInterval) clearInterval(validationInterval); renderMenu(); updateAuthUI(); loadPage('home1'); const t=document.getElementById('signoutToast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
  function showToast(msg,err=false){ const t=document.createElement('div'); t.className='session-toast'; t.innerHTML=`<i class="fas ${err?'fa-exclamation-triangle':'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),4000); }
  
  async function callGoogleScript(action,data={}){ try{ const res=await fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({action,...data})}); return await res.json(); }catch(e){ return {success:false,message:'Network error'}; } }
  async function authenticateUser(u,p){ return await callGoogleScript('login',{username:u,password:p}); }
  async function registerUser(n,e,p){ return await callGoogleScript('signup',{name:n,email:e,password:p}); }
  async function validateCurrentSession(){ const s=getSession(); if(!s) return false; const res=await callGoogleScript('validateSession',{username:s.username}); if(!res.success||!res.data?.isValid){ clearSession(); renderMenu(); updateAuthUI(); showToast('Session expired. Login again.',true); return false; } return true; }
  function startSessionValidation(){ if(validationInterval) clearInterval(validationInterval); validationInterval=setInterval(async()=>{const ok=await validateCurrentSession(); if(!ok&&validationInterval) clearInterval(validationInterval);},30000);}
  
  window.loadPage=(page)=>{ document.getElementById('frameContent').src=page+'.htm'; };
  
  // Control Manager Functions
  async function loadUsersFromSheet(){ const container=document.getElementById('usersListContainer'); if(!container) return; container.innerHTML='<div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>'; const res=await callGoogleScript('getUsers'); if(res.success && res.data?.users){ displayViewWithToggle(res.data.users, container); }else{ container.innerHTML='<div class="empty-state">Failed to load</div>'; } }
  function displayViewWithToggle(users, container){ if(!users.length){ container.innerHTML='<div class="empty-state">No users</div>'; return; } let html='<table class="users-table"><thead><tr><th>#</th><th>Username</th><th>Role</th><th>Permission</th><th>Allow/Disallow</th></tr></thead><tbody>'; users.forEach((u,idx)=>{ html+=`<tr><td>${idx+1}</td><td>${escapeHtml(u.username)}</td><td><span class="permission-badge" style="background:${u.role==='Admin'?'#C44545':(u.role==='Office'?'#2E7D64':'#1E5A6B')}">${u.role}</span></td><td><span class="permission-badge ${u.permission==='Allowed'?'permission-allowed':'permission-denied'}">${u.permission}</span></td><td><label class="switch"><input type="checkbox" class="perm-slider" data-id="${u.id}" data-username="${escapeHtml(u.username)}" ${u.permission==='Allowed'?'checked':''}><span class="slider"></span></label></td></tr>`; }); html+='</tbody></table>'; container.innerHTML=html; document.querySelectorAll('.perm-slider').forEach(slider=>{ slider.addEventListener('change',async(e)=>{ const userId=slider.dataset.id; const username=slider.dataset.username; const newPerm=slider.checked?'Allowed':'Denied'; const result=await callGoogleScript('updatePermission',{userId,permission:newPerm}); if(result.success){ showToast(`Permission for "${username}" → ${newPerm}`); await loadUsersFromSheet(); await loadPermissionPanel(); }else{ slider.checked=!slider.checked; showToast('Error: '+result.message,true); } }); }); }
  async function loadPermissionPanel(){ const container=document.getElementById('permissionUsersList'); if(!container) return; container.innerHTML='<div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>'; const res=await callGoogleScript('getUsers'); if(res.success && res.data?.users){ const searchTerm=document.getElementById('permSearch')?.value.toLowerCase()||''; const filtered=res.data.users.filter(u=>u.username.toLowerCase().includes(searchTerm)); displayPermissionPanel(filtered, container); }else{ container.innerHTML='<div class="empty-state">Failed to load</div>'; } }
  function displayPermissionPanel(users, container){ if(!users.length){ container.innerHTML='<div class="empty-state">No users match</div>'; return; } let html='<table class="users-table"><thead><tr><th>Username</th><th>Role</th><th>Current Permission</th><th>Change Permission</th><th>Change Role</th></tr></thead><tbody>'; users.forEach(user=>{ html+=`<tr><td>${escapeHtml(user.username)}</td><td><select class="role-select" data-id="${user.id}"><option ${user.role==='User'?'selected':''}>User</option><option ${user.role==='Office'?'selected':''}>Office</option><option ${user.role==='Admin'?'selected':''}>Admin</option></select></td><td><span class="permission-badge ${user.permission==='Allowed'?'permission-allowed':'permission-denied'}">${user.permission}</span></td><td><label class="switch"><input type="checkbox" class="perm-toggle-main" data-id="${user.id}" data-username="${escapeHtml(user.username)}" ${user.permission==='Allowed'?'checked':''}><span class="slider"></span></label></td><td><button class="update-role-btn" data-id="${user.id}" data-username="${escapeHtml(user.username)}">Save Role</button></td></tr>`; }); html+='</tbody></table>'; container.innerHTML=html; attachPermEvents(); }
  function attachPermEvents(){ document.querySelectorAll('.perm-toggle-main').forEach(toggle=>{ toggle.addEventListener('change',async(e)=>{ const userId=toggle.dataset.id; const username=toggle.dataset.username; const newPerm=toggle.checked?'Allowed':'Denied'; const result=await callGoogleScript('updatePermission',{userId,permission:newPerm}); const msgDiv=document.getElementById('permMsg'); if(result.success){ msgDiv.innerHTML=`✅ Permission for ${username} updated to ${newPerm}`; msgDiv.style.color='#a5d6a5'; loadPermissionPanel(); loadUsersFromSheet(); }else{ toggle.checked=!toggle.checked; msgDiv.innerHTML='❌ '+result.message; msgDiv.style.color='#ffaa88'; } setTimeout(()=>msgDiv.innerHTML='',2500); }); }); document.querySelectorAll('.update-role-btn').forEach(btn=>{ btn.addEventListener('click',async()=>{ const userId=btn.dataset.id; const username=btn.dataset.username; const select=document.querySelector(`.role-select[data-id="${userId}"]`); const newRole=select.value; const res=await callGoogleScript('updatePermission',{userId,role:newRole}); const msgDiv=document.getElementById('permMsg'); if(res.success){ msgDiv.innerHTML=`✅ Role for ${username} → ${newRole}`; msgDiv.style.color='#a5d6a5'; loadPermissionPanel(); loadUsersFromSheet(); showToast(`Role changed to ${newRole} for ${username}`); }else{ msgDiv.innerHTML='❌ '+res.message; msgDiv.style.color='#ffaa88'; } setTimeout(()=>msgDiv.innerHTML='',2500); }); }); }
  async function loadDeletePanel(){ const container=document.getElementById('deleteUsersList'); if(!container) return; container.innerHTML='<div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>'; const res=await callGoogleScript('getUsers'); if(res.success && res.data?.users){ const search=document.getElementById('deleteSearch')?.value.toLowerCase()||''; const filtered=res.data.users.filter(u=>u.username.toLowerCase().includes(search)); displayDeleteList(filtered,container); }else{ container.innerHTML='<div class="empty-state">Failed</div>'; } }
  function displayDeleteList(users,container){ if(!users.length){ container.innerHTML='<div class="empty-state">No users</div>'; return; } let html='<table class="users-table"><thead><tr><th>Username</th><th>Role</th><th>Permission</th><th>Action</th></tr></thead><tbody>'; users.forEach(user=>{ html+=`<tr><td>${escapeHtml(user.username)}</td><td>${user.role}</td><td><span class="permission-badge ${user.permission==='Allowed'?'permission-allowed':'permission-denied'}">${user.permission}</span></td><td><button class="del-user-btn" data-id="${user.id}" data-username="${escapeHtml(user.username)}" style="background:#B34A4A;border:none;padding:6px 12px;border-radius:30px;color:white;cursor:pointer;"><i class="fas fa-trash"></i> Delete</button></td></tr>`; }); html+='</tbody></table>'; container.innerHTML=html; document.querySelectorAll('.del-user-btn').forEach(btn=>{ btn.addEventListener('click',async()=>{ if(confirm(`Delete "${btn.dataset.username}" permanently?`)){ const res=await callGoogleScript('deleteUser',{userId:btn.dataset.id}); const msgDiv=document.getElementById('deleteMsg'); if(res.success){ msgDiv.innerHTML=`✅ Deleted ${btn.dataset.username}`; msgDiv.style.color='#a5d6a5'; loadDeletePanel(); loadUsersFromSheet(); loadPermissionPanel(); showToast(`User ${btn.dataset.username} deleted`); }else{ msgDiv.innerHTML='❌ '+res.message; } setTimeout(()=>msgDiv.innerHTML='',3000); } }); }); }
  document.getElementById('addUserForm')?.addEventListener('submit',async(e)=>{ e.preventDefault(); const name=document.getElementById('addFullName').value.trim(); const email=document.getElementById('addEmail').value.trim().toLowerCase(); const pwd=document.getElementById('addPassword').value; const role=document.getElementById('addRole').value; const perm=document.getElementById('addPermission').value; const msgDiv=document.getElementById('addUserMsg'); if(!name||!email||!pwd){ msgDiv.innerHTML='❌ All required'; setTimeout(()=>msgDiv.innerHTML='',3000); return; } const btn=e.target.querySelector('button'); const orig=btn.innerHTML; btn.innerHTML='<div class="loading-spinner"></div> Creating...'; btn.disabled=true; const result=await callGoogleScript('addUser',{name,email,password:pwd,role,permission:perm}); if(result.success){ msgDiv.innerHTML='✅ User created'; document.getElementById('addUserForm').reset(); loadUsersFromSheet(); loadPermissionPanel(); }else{ msgDiv.innerHTML='❌ '+result.message; } setTimeout(()=>msgDiv.innerHTML='',3000); btn.innerHTML=orig; btn.disabled=false; });
  function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  
  const controlModal=document.getElementById('controlManagerModal'), closeControlBtn=document.getElementById('closeControlModal');
  window.openControlManager=(tab='add')=>{ const s=getSession(); if(!s||normalizeRole(s.role)!=='Admin'){ showToast('Access Denied. Admin only.',true); return; } controlModal.classList.add('active'); document.body.style.overflow='hidden'; document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active-panel')); document.getElementById(`${tab}Panel`).classList.add('active-panel'); document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active')); document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active'); if(tab==='view') loadUsersFromSheet(); if(tab==='permission') loadPermissionPanel(); if(tab==='delete') loadDeletePanel(); };
  function closeControlManager(){ controlModal.classList.remove('active'); document.body.style.overflow=''; }
  closeControlBtn?.addEventListener('click',closeControlManager); controlModal?.addEventListener('click',(e)=>{ if(e.target===controlModal) closeControlManager(); });
  document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const t=btn.dataset.tab; window.openControlManager(t); }); });
  document.getElementById('deleteSearch')?.addEventListener('input',()=>loadDeletePanel()); document.getElementById('permSearch')?.addEventListener('input',()=>loadPermissionPanel()); document.getElementById('searchUsers')?.addEventListener('input',()=>loadUsersFromSheet());

  // Modal handlers
  const loginModal=document.getElementById('signinModal');
  document.getElementById('closeModalBtn')?.addEventListener('click',()=>loginModal.classList.remove('active'));
  loginModal?.addEventListener('click',(e)=>{ if(e.target===loginModal) loginModal.classList.remove('active'); });
  document.getElementById('modalSigninTab')?.addEventListener('click',()=>{ document.getElementById('modalSigninTab').classList.add('active'); document.getElementById('modalSignupTab').classList.remove('active'); document.getElementById('modalSigninPanel').classList.add('active-panel-modal'); document.getElementById('modalSignupPanel').classList.remove('active-panel-modal'); });
  document.getElementById('modalSignupTab')?.addEventListener('click',()=>{ document.getElementById('modalSignupTab').classList.add('active'); document.getElementById('modalSigninTab').classList.remove('active'); document.getElementById('modalSignupPanel').classList.add('active-panel-modal'); document.getElementById('modalSigninPanel').classList.remove('active-panel-modal'); });
  
  document.getElementById('modalLoginForm')?.addEventListener('submit',async(e)=>{ e.preventDefault(); const user=document.getElementById('modalLoginUser').value.trim().toLowerCase(); const pass=document.getElementById('modalLoginPass').value; const remember=document.getElementById('modalRemember').checked; const msgDiv=document.getElementById('modalLoginMsg'); const btn=e.target.querySelector('button'); const orig=btn.innerHTML; if(!user||!pass){ msgDiv.innerHTML='All fields required'; msgDiv.className='message-area-modal error-msg-modal'; return; } btn.innerHTML='<div class="loading-spinner"></div>'; btn.disabled=true; const result=await authenticateUser(user,pass); if(result.success){ const sessionData={ username:user, role:result.data?.role||'User', name:result.data?.name||user.split('@')[0] }; setSession(sessionData,remember); renderMenu(); updateAuthUI(); loginModal.classList.remove('active'); showToast(`Welcome ${sessionData.name}! Role: ${getRoleDisplay(sessionData.role)}`); startSessionValidation(); loadPage('home1'); }else{ msgDiv.innerHTML=result.message||'Invalid credentials'; msgDiv.className='message-area-modal error-msg-modal'; } btn.innerHTML=orig; btn.disabled=false; });
  
  document.getElementById('modalSignupForm')?.addEventListener('submit',async(e)=>{ e.preventDefault(); const name=document.getElementById('modalSignupName').value.trim(); const email=document.getElementById('modalSignupEmail').value.trim().toLowerCase(); const pass=document.getElementById('modalSignupPass').value; const terms=document.getElementById('modalTerms').checked; const msgDiv=document.getElementById('modalSignupMsg'); const btn=e.target.querySelector('button'); const orig=btn.innerHTML; if(!name||!email||!pass){ msgDiv.innerHTML='All fields required'; msgDiv.className='message-area-modal error-msg-modal'; return; } if(pass.length<4){ msgDiv.innerHTML='Min 4 chars'; msgDiv.className='message-area-modal error-msg-modal'; return; } if(!terms){ msgDiv.innerHTML='Accept terms'; msgDiv.className='message-area-modal error-msg-modal'; return; } btn.innerHTML='<div class="loading-spinner"></div>'; btn.disabled=true; const result=await registerUser(name,email,pass); if(result.success){ msgDiv.innerHTML='✅ Account created! Awaiting admin approval.'; msgDiv.className='message-area-modal success-msg-modal'; document.getElementById('modalSignupForm').reset(); setTimeout(()=>{ document.getElementById('modalSigninTab').click(); document.getElementById('modalLoginUser').value=email; },2000); }else{ msgDiv.innerHTML=result.message||'Signup failed'; msgDiv.className='message-area-modal error-msg-modal'; } btn.innerHTML=orig; btn.disabled=false; });
  
  function init(){ renderMenu(); updateAuthUI(); if(getSession()) startSessionValidation(); }
  init();
</script>
</body>
</html>
