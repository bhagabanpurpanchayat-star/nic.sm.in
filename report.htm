<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NIT Report Viewer</title>

<style>

  /* ---------- GLOBAL UI ---------- */
  body {
    font-family: "Segoe UI", sans-serif;
    background: #eef1f7;
    padding: 20px;
    color: #2c3e50;
    font-size: 11px;
  }

  /* ---------- HEADER STRIP ---------- */
  .page-header {
    padding: 12px;
    background: linear-gradient(135deg,#34495e,#2c3e50);
    color: white;
    border-radius: 8px;
    margin-bottom: 15px;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  h2 {
    font-size: 14px;
    margin-bottom: 12px;
    color: #34495e;
    text-align: left;
  }

  /* ---------- SELECT + BUTTONS ---------- */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: flex-end;
    margin-bottom: 15px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .control-group label {
    font-size: 11px;
    font-weight: 600;
    color: #2c3e50;
  }

  select, button {
    padding: 6px 12px;
    font-size: 11px;
    border-radius: 5px;
    border: none;
    outline: none;
    cursor: pointer;
    transition: 0.2s ease;
  }

  select {
    background: white;
    border: 1px solid #bbb;
    min-width: 200px;
  }

  button {
    background: #3498db;
    color: white;
    font-weight: 500;
  }

  button:hover {
    background: #217dbb;
    transform: translateY(-1px);
  }

  .btn-excel {
    background: #1e6f3f;
  }

  .btn-excel:hover {
    background: #155a34;
  }

  .btn-print {
    background: #0f172a;
  }

  .btn-print:hover {
    background: #1e293b;
  }

  /* ---------- OUTPUT CARD ---------- */
  #output {
    margin-top: 15px;
    padding: 15px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  /* ---------- TABLE ---------- */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    background: white;
    font-size: 10px;
  }

  th {
    background: #000000;
    color: white;
    padding: 8px 6px;
    font-size: 10px;
    border: 1px solid #333;
  }

  td {
    padding: 6px;
    border: 1px solid #ddd;
    font-size: 10px;
  }

  tr:hover td {
    background: #f1f7ff;
  }

  .total-row {
    font-weight: bold;
    background: #fceabb !important;
  }

  .report-header {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 10px;
    padding: 8px;
    background: #f8f9fa;
    border-radius: 6px;
    border-left: 3px solid #3498db;
  }

  /* ---------- LOADER ---------- */
  #loader {
    display: none;
    margin-top: 15px;
    font-size: 11px;
    font-weight: bold;
    color: #2980b9;
    text-align: center;
    padding: 15px;
  }

  .toast-message {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    z-index: 1000;
    font-size: 11px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from {
      transform: translateX(100%);
      opacity: 0;
    }
    to {
      transform: translateX(0);
      opacity: 1;
    }
  }

  /* ---------- PRINT MODE - SAME WINDOW, CONTENT ONLY ---------- */
  @media print {
    button, select, h2, .controls, .control-group, label, .page-header {
      display: none !important;
    }
    
    body {
      background: white;
      padding: 0;
      margin: 0;
    }
    
    #output {
      box-shadow: none;
      padding: 0;
      margin: 0;
    }
    
    .report-header {
      display: none;
    }
    
    table {
      font-size: 8pt;
      width: 100%;
    }
    
    th {
      background: #000000 !important;
      color: white !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      border: 1px solid #000;
      padding: 5px 4px;
      font-size: 8pt;
    }
    
    td {
      border: 1px solid #000;
      padding: 4px;
      font-size: 8pt;
    }
    
    thead {
      display: table-header-group;
    }
    
    tr {
      page-break-inside: avoid;
    }
    
    @page {
      size: landscape;
      margin: 0.2in;
    }
  }

  @media (max-width: 768px) {
    body {
      padding: 12px;
    }
    select, button {
      padding: 5px 10px;
      font-size: 10px;
    }
    th, td {
      padding: 4px;
      font-size: 9px;
    }
  }

</style>
</head>
<body>

<div class="page-header">Tender Status – NIT Based Report</div>

<h2>Select NIT to Generate Report</h2>

<div class="controls">
  <div class="control-group">
    <label>Select NIT:</label>
    <select id="nitSelect"></select>
  </div>
  <button onclick="loadReport()">Load Report</button>
  <button class="btn-excel" onclick="exportToExcel()">Export Excel</button>
  <button class="btn-print" onclick="printReport()">Print</button>
</div>

<div id="loader">Loading report...</div>

<div id="output"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyhCDxKqIHUOH2KoyTHeO33KW_-UWT3ggL00iH9FMsek_PammWQwX7vRNkoCkGf_7xw/exec";

let currentNIT = null;
let currentReportData = null;
let totalAccepted = 0;
let totalRejected = 0;

function showMessage(msg, type) {
  const existing = document.querySelector('.toast-message');
  if (existing) existing.remove();
  
  const toast = document.createElement('div');
  toast.className = 'toast-message';
  toast.innerHTML = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function generateExcelHTML() {
  if (!currentReportData || currentReportData.length === 0) {
    return '<html><body>No data</body></html>';
  }
  
  let html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>NIT Report - ' + currentNIT + '</title>';
  html += '<style>';
  html += 'th { background: #000000; color: #ffffff; padding: 8px; border: 1px solid #000; }';
  html += 'td { border: 1px solid #ccc; padding: 6px; }';
  html += 'table { border-collapse: collapse; width: 100%; }';
  html += '.total-row { background-color: #fceabb; font-weight: bold; }';
  html += '</style></head><body>';
  html += '<h2>NIT REPORT: ' + escapeHtml(currentNIT) + '</h2>';
  html += '<p>Generated: ' + new Date().toLocaleString() + '</p>';
  html += '<p>Total Vendors: ' + currentReportData.length + '</p>';
  html += '<p>Total Accepted Amount: ' + totalAccepted + '</p>';
  html += '<p>Total Rejected Amount: ' + totalRejected + '</p>';
  html += '<table border="1" cellpadding="6" cellspacing="0">';
  html += '<thead><tr><th>Vendor</th><th>Accepted SL</th><th>Rejected SL</th><th>Accepted Amt</th><th>Rejected Amt</th></tr></thead><tbody>';
  
  for (let v of currentReportData) {
    html += '<tr>';
    html += '<td>' + escapeHtml(v.vendor) + '</td>';
    html += '<td>' + (v.acceptedSLs.join(", ") || '—') + '</td>';
    html += '<td>' + (v.rejectedSLs.join(", ") || '—') + '</td>';
    html += '<td>' + v.acceptedAmount + '</td>';
    html += '<td>' + v.rejectedAmount + '</td>';
    html += '</tr>';
  }
  
  html += '<tr class="total-row"><td colspan="3" style="text-align:right">TOTAL :</td>';
  html += '<td>' + totalAccepted + '</td><td>' + totalRejected + '</td></tr>';
  html += '</tbody></table></body></html>';
  
  return html;
}

function exportToExcel() {
  if (!currentReportData || currentReportData.length === 0) {
    showMessage('No data to export. Load a report first.', 'error');
    return;
  }
  
  const html = generateExcelHTML();
  const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.href = url;
  link.download = 'NIT_Report_' + currentNIT + '_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.xls';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  showMessage('Excel export complete!', 'success');
}

function printReport() {
  if (!currentReportData || currentReportData.length === 0) {
    showMessage('No data to print. Load a report first.', 'error');
    return;
  }
  
  window.print();
  showMessage('Print dialog opened', 'success');
}

function generatePrintHTML() {
  if (!currentReportData || currentReportData.length === 0) {
    return '<html><body>No data</body></html>';
  }
  
  let html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>NIT Report - ' + currentNIT + '</title>';
  html += '<style>';
  html += 'body { font-family: Arial, sans-serif; margin: 0; padding: 0.1in; }';
  html += 'h2 { font-size: 12pt; margin-bottom: 8px; }';
  html += '.info { margin-bottom: 10px; font-size: 8pt; }';
  html += 'table { width: 100%; border-collapse: collapse; font-size: 8pt; }';
  html += 'th { background: #000000; color: #ffffff; padding: 5px; border: 1px solid #000; }';
  html += 'td { border: 1px solid #000; padding: 4px; }';
  html += '.total-row { background-color: #fceabb; font-weight: bold; }';
  html += 'thead { display: table-header-group; }';
  html += 'tr { page-break-inside: avoid; }';
  html += '@page { size: landscape; margin: 0.2in; }';
  html += '</style></head><body>';
  html += '<h2>NIT REPORT: ' + escapeHtml(currentNIT) + '</h2>';
  html += '<div class="info">Generated: ' + new Date().toLocaleString() + ' | Vendors: ' + currentReportData.length + ' | Accepted: ' + totalAccepted + ' | Rejected: ' + totalRejected + '</div>';
  html += '<table border="1" cellpadding="4" cellspacing="0">';
  html += '<thead><tr><th>Vendor</th><th>Accepted SL</th><th>Rejected SL</th><th>Accepted Amt</th><th>Rejected Amt</th></tr></thead><tbody>';
  
  for (let v of currentReportData) {
    html += '<tr>';
    html += '<td>' + escapeHtml(v.vendor) + '</td>';
    html += '<td>' + (v.acceptedSLs.join(", ") || '—') + '</td>';
    html += '<td>' + (v.rejectedSLs.join(", ") || '—') + '</td>';
    html += '<td>' + v.acceptedAmount + '</td>';
    html += '<td>' + v.rejectedAmount + '</td>';
    html += '</tr>';
  }
  
  html += '<tr class="total-row"><td colspan="3" style="text-align:right">TOTAL :</td>';
  html += '<td>' + totalAccepted + '</td><td>' + totalRejected + '</td></tr>';
  html += '</tbody></table></body></html>';
  
  return html;
}

/* Load NIT List */
fetch(API + "?action=listNIT")
  .then(r => r.json())
  .then(list => {
    const sel = document.getElementById("nitSelect");
    list.forEach(n => {
      const opt = document.createElement("option");
      opt.value = n;
      opt.textContent = n;
      sel.appendChild(opt);
    });
    showMessage('NIT list loaded', 'success');
  })
  .catch(err => {
    console.error('Error:', err);
    showMessage('Failed to load NIT list', 'error');
  });

/* Load Report */
function loadReport() {
  const nit = document.getElementById("nitSelect").value;
  
  if (!nit) {
    showMessage('Please select a NIT first', 'error');
    return;
  }
  
  currentNIT = nit;
  document.getElementById("loader").style.display = "block";
  document.getElementById("output").innerHTML = "";
  
  fetch(API + "?action=report&nit=" + encodeURIComponent(nit))
    .then(r => r.json())
    .then(data => {
      document.getElementById("loader").style.display = "none";
      
      if (!data.length) {
        document.getElementById("output").innerHTML = "<div style='padding:20px; text-align:center;'>No records found for this NIT.</div>";
        showMessage('No records found', 'info');
        currentReportData = null;
        return;
      }
      
      currentReportData = data;
      totalAccepted = 0;
      totalRejected = 0;
      
      data.forEach(v => {
        totalAccepted += Number(v.acceptedAmount) || 0;
        totalRejected += Number(v.rejectedAmount) || 0;
      });
      
      let html = `
        <div class="report-header">
          <strong>NIT: ${escapeHtml(nit)}</strong> | 
          Vendors: ${data.length} | 
          Accepted: ${totalAccepted} | 
          Rejected: ${totalRejected} |
          Generated: ${new Date().toLocaleString()}
        </div>
      `;
      
      html += '<table>';
      html += '<thead><tr><th>Vendor</th><th>Accepted SL</th><th>Rejected SL</th><th>Accepted Amt</th><th>Rejected Amt</th></tr></thead><tbody>';
      
      data.forEach(v => {
        html += '<tr>';
        html += '<td>' + escapeHtml(v.vendor) + '</td>';
        html += '<td>' + (v.acceptedSLs.join(", ") || '—') + '</td>';
        html += '<td>' + (v.rejectedSLs.join(", ") || '—') + '</td>';
        html += '<td>' + v.acceptedAmount + '</td>';
        html += '<td>' + v.rejectedAmount + '</td>';
        html += '</tr>';
      });
      
      html += '<tr class="total-row"><td colspan="3" style="text-align:right">TOTAL :</td>';
      html += '<td>' + totalAccepted + '</td><td>' + totalRejected + '</td></tr>';
      html += '</tbody></table>';
      
      document.getElementById("output").innerHTML = html;
      showMessage(`Report loaded for NIT: ${nit}`, 'success');
    })
    .catch(err => {
      document.getElementById("loader").style.display = "none";
      document.getElementById("output").innerHTML = `<div style="color:#dc3545; padding:20px;">Error: ${err.message}</div>`;
      showMessage('Failed to load report', 'error');
    });
}

window.loadReport = loadReport;
window.exportToExcel = exportToExcel;
window.printReport = printReport;

</script>

</body>
</html>
